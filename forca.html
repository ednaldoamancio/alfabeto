
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EdHumanas - Forca Educativa</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        /* Topo e Controles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        h1 { font-size: 1.5rem; margin: 0; letter-spacing: 3px; }

        .audio-controls {
            display: flex;
            gap: 15px;
        }

        .audio-btn {
            background: none;
            border: 2px solid #fff;
            color: #fff;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }

        .audio-btn.active { background-color: #fff; color: #000; }

        /* Container Principal: Forca Esquerda | Teclado Direita */
        main {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: space-around;
            gap: 20px;
            min-height: 0; /* Importante para o flex não vazar */
        }

        #hangman-container {
            flex: 1;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #hangman-svg {
            height: 80%;
            width: auto;
        }

        #keyboard-container {
            flex: 1;
            max-width: 600px;
        }

        #keyboard {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .key {
            background-color: #111;
            color: #fff;
            border: 2px solid #fff;
            padding: 15px 0;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
        }

        .key:active { background-color: #fff; color: #000; }
        .key:disabled { opacity: 0.2; border-color: #444; }

        /* Área de Palavra (Rodapé Horizontal) */
        footer {
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-top: 2px solid #333;
        }

        #word-display {
            font-size: 3.5rem;
            letter-spacing: 20px;
            font-weight: 900;
            text-transform: uppercase;
        }

        #message {
            height: 30px;
            font-size: 1.2rem;
            color: #ff4444;
            font-weight: bold;
            margin-bottom: 5px;
        }

        line, circle, path {
            stroke: #fff;
            stroke-width: 6;
            fill: none;
        }

        .dead-face { stroke: #ff4444 !important; }

        #reset-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 25px 50px;
            font-size: 1.5rem;
            background: #fff;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            display: none;
            box-shadow: 0 0 30px rgba(255,255,255,0.4);
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            main { flex-direction: column; }
            #keyboard { grid-template-columns: repeat(9, 1fr); gap: 5px; }
            .key { padding: 10px 0; font-size: 1rem; }
            #word-display { font-size: 2rem; letter-spacing: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>FORCA</h1>
        <div class="audio-controls">
            <div id="stats">PALAVRAS: <span id="count">100</span></div>
            <button id="bg-music-btn" class="audio-btn" onclick="toggleMusic()">SOM: DESLIGADO</button>
        </div>
    </header>

    <main>
        <div id="hangman-container">
            <svg id="hangman-svg" viewBox="0 0 200 250">
                <line x1="20" y1="230" x2="180" y2="230" />
                <line x1="50" y1="230" x2="50" y2="20" />
                <line x1="50" y1="20" x2="130" y2="20" />
                <line x1="130" y1="20" x2="130" y2="50" />
                <g id="head-group" style="display:none">
                    <circle id="head-circle" cx="130" cy="75" r="20" />
                    <g id="dead-details" style="display:none">
                        <line x1="120" y1="65" x2="128" y2="73" class="dead-face" />
                        <line x1="128" y1="65" x2="120" y2="73" class="dead-face" />
                        <line x1="132" y1="65" x2="140" y2="73" class="dead-face" />
                        <line x1="140" y1="65" x2="132" y2="73" class="dead-face" />
                        <path d="M 120 85 Q 130 75 140 85" class="dead-face" />
                    </g>
                </g>
                <line id="body" x1="130" y1="95" x2="130" y2="170" style="display:none" />
                <line id="arm-l" x1="130" y1="120" x2="100" y2="150" style="display:none" />
                <line id="arm-r" x1="130" y1="120" x2="160" y2="150" style="display:none" />
                <line id="leg-l" x1="130" y1="170" x2="100" y2="210" style="display:none" />
                <line id="leg-r" x1="130" y1="170" x2="160" y2="210" style="display:none" />
            </svg>
        </div>

        <div id="keyboard-container">
            <div id="keyboard"></div>
        </div>
    </main>

    <footer>
        <div id="message"></div>
        <div id="word-display">_ _ _ _ _</div>
    </footer>

    <button id="reset-btn" onclick="nextRound()">PRÓXIMA PALAVRA</button>

    <audio id="snd-acerto" src="estampido.ogg"></audio>
    <audio id="snd-erro" src="erro.ogg"></audio>
    <audio id="snd-vitoria" src="aplausos.ogg"></audio>
    <audio id="snd-bg" src="musica_fundo_sebran.ogg" loop></audio>

    <script>
        const words = ["AMARELINHA", "BONECA", "CARRINHO", "PETECA", "PEAO", "PULACORDA", "ESCONDEESCONDE", "PEGAPEGA", "PIPA", "IOIO", "BALANCO", "ESCORREGADOR", "GIRAGIRA", "DOMINO", "XADREZ", "DAMA", "LUDO", "QUEBRACABECA", "MASSINHA", "AQUARELA", "CINDERELA", "PINOQUIO", "BRANCADENEVE", "RAPUNZEL", "ALADDIN", "PETERPAN", "SININHO", "GATODEBOTAS", "JOAOEMARIA", "LOBO MAU", "CHAPEUZINHOVERMELHO", "TRESPORQUINHOS", "PATOFEIO", "BELAEFERA", "PEQUENASEREIA", "REILEAO", "POCAHONTAS", "MULAN", "TARZAN", "ALICE", "FADAMADRINHA", "PALHACO", "MAGICO", "BAMBOLE", "CATAVENTO", "BOLINHADESABAO", "QUEIMADA", "CABODESGUERRA", "ESTATUA", "PASSANEL", "TELEFONESEMFIO", "BATATAQUENTE", "CADEIRAS", "CORRECOTIA", "PULAPULA", "LEGO", "BARBIE", "PELUCIA", "MARIONETE", "FANTOCHE", "DEDOCHE", "CASTELO", "DRAGAO", "PRINCESA", "PRINCIPE", "PIRATA", "UNICORNIO"];
        
        let availableWords = [...words].map(w => w.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""));
        let currentWord = "";
        let guessedLetters = [];
        let mistakes = 0;
        let musicPlaying = false;
        const bodyParts = ['head-group', 'body', 'arm-l', 'arm-r', 'leg-l', 'leg-r'];

        function playSnd(id) {
            const snd = document.getElementById(id);
            snd.currentTime = 0;
            snd.play().catch(e => console.log("Áudio pendente de interação"));
        }

        function toggleMusic() {
            const bg = document.getElementById('snd-bg');
            const btn = document.getElementById('bg-music-btn');
            if (!musicPlaying) {
                bg.play();
                btn.innerText = "SOM: LIGADO";
                btn.classList.add('active');
            } else {
                bg.pause();
                btn.innerText = "SOM: DESLIGADO";
                btn.classList.remove('active');
            }
            musicPlaying = !musicPlaying;
        }

        function initGame() {
            if (availableWords.length === 0) {
                document.getElementById('message').innerText = "VOCÊ VENCEU TODAS AS 100 ETAPAS!";
                return;
            }
            const idx = Math.floor(Math.random() * availableWords.length);
            currentWord = availableWords.splice(idx, 1)[0];
            guessedLetters = [];
            mistakes = 0;
            document.getElementById('count').innerText = availableWords.length;
            document.getElementById('reset-btn').style.display = "none";
            document.getElementById('dead-details').style.display = "none";
            document.getElementById('head-circle').classList.remove('dead-face');
            bodyParts.forEach(p => document.getElementById(p).style.display = "none");
            renderWord();
            renderKeyboard();
            document.getElementById('message').innerText = "";
        }

        function renderWord() {
            const d = currentWord.split('').map(l => guessedLetters.includes(l) ? l : "_").join(" ");
            document.getElementById('word-display').innerText = d;
            if (!d.includes("_")) endGame(true);
        }

        function renderKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = "";
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
                const b = document.createElement('button');
                b.innerText = l;
                b.className = 'key';
                b.id = 'k-' + l;
                b.onclick = () => handleGuess(l);
                kb.appendChild(b);
            });
        }

        function handleGuess(l) {
            if (guessedLetters.includes(l) || mistakes >= 6) return;
            const btn = document.getElementById('k-' + l);
            if (btn) btn.disabled = true;

            if (currentWord.includes(l)) {
                guessedLetters.push(l);
                playSnd('snd-acerto');
                renderWord();
            } else {
                mistakes++;
                playSnd('snd-erro');
                document.getElementById(bodyParts[mistakes-1]).style.display = "block";
                if (mistakes === 6) {
                    document.getElementById('dead-details').style.display = "block";
                    document.getElementById('head-circle').classList.add('dead-face');
                    endGame(false);
                }
            }
        }

        function endGame(win) {
            const msg = document.getElementById('message');
            if (win) {
                playSnd('snd-vitoria');
                msg.innerText = "PARABÉNS!";
                msg.style.color = "#44ff44";
            } else {
                msg.innerText = "FIM DE JOGO! PALAVRA: " + currentWord;
                msg.style.color = "#ff4444";
            }
            document.getElementById('reset-btn').style.display = "block";
        }

        function nextRound() { initGame(); }

        window.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            if (/^[A-Z]$/.test(key)) handleGuess(key);
        });

        initGame();
    </script>
</body>
</html>
