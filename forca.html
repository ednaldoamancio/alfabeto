<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EdHumanas - Forca Educativa</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            padding: 5px 15px;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px;
            flex-shrink: 0;
        }

        h1 { font-size: 1rem; margin: 0; letter-spacing: 2px; }

        .audio-btn {
            background: none;
            border: 1.5px solid #fff;
            color: #fff;
            padding: 4px 8px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            font-size: 0.7rem;
        }

        #game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        #top-row {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: space-around;
            gap: 10px;
            min-height: 0;
        }

        #hangman-container {
            flex: 1;
            height: 80%;
            display: flex;
            justify-content: center;
        }

        #hangman-svg { height: 100%; width: auto; }

        #keyboard-container {
            flex: 1.5;
            max-width: 450px;
        }

        #keyboard {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .key {
            background-color: #111;
            color: #fff;
            border: 1.5px solid #fff;
            padding: 10px 0;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .key:disabled { 
            opacity: 0.15;
            border-color: #333;
            color: #555;
            cursor: default;
        }

        #display-section {
            padding: 15px 0 35px 0;
            text-align: center;
            border-top: 1px solid #333;
            background: #000;
            flex-shrink: 0;
        }

        #category-info {
            font-size: 0.9rem;
            color: #ffeb3b;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: bold;
        }

        #word-display {
            font-size: 2rem;
            letter-spacing: 8px;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.2;
            display: inline-block;
        }

        footer {
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            color: #666;
            flex-shrink: 0;
        }

        #message {
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            color: #ff4444;
            z-index: 5;
            text-align: center;
            width: 90%;
            font-size: 1.1rem;
        }

        line, circle, path { stroke: #fff; stroke-width: 6; fill: none; }
        .dead-face { stroke: #ff4444 !important; }

        #reset-btn {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 1.3rem;
            background: #fff;
            color: #000;
            font-weight: bold;
            z-index: 100;
            display: none;
            border-radius: 10px;
            border: none;
        }

        @media (max-width: 768px) {
            #top-row { flex-direction: column; padding-top: 20px; }
            #hangman-container { height: 25%; min-height: 110px; }
            #keyboard { grid-template-columns: repeat(9, 1fr); }
            #word-display { font-size: 1.6rem; letter-spacing: 5px; }
            #display-section { padding-bottom: 50px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>FORCA</h1>
        <div class="audio-controls">
            <button id="bg-music-btn" class="audio-btn" onclick="toggleMusic()">SOM: OFF</button>
        </div>
    </header>

    <div id="message"></div>

    <div id="game-area">
        <div id="top-row">
            <div id="hangman-container">
                <svg id="hangman-svg" viewBox="0 0 200 250">
                    <line x1="20" y1="230" x2="180" y2="230" />
                    <line x1="50" y1="230" x2="50" y2="20" />
                    <line x1="50" y1="20" x2="130" y2="20" />
                    <line x1="130" y1="20" x2="130" y2="50" />
                    <g id="head-group" style="display:none">
                        <circle id="head-circle" cx="130" cy="75" r="20" />
                        <g id="dead-details" style="display:none">
                            <line x1="120" y1="65" x2="128" y2="73" class="dead-face" />
                            <line x1="128" y1="65" x2="120" y2="73" class="dead-face" />
                            <line x1="132" y1="65" x2="140" y2="73" class="dead-face" />
                            <line x1="140" y1="65" x2="132" y2="73" class="dead-face" />
                            <path d="M 120 85 Q 130 75 140 85" class="dead-face" />
                        </g>
                    </g>
                    <line id="body" x1="130" y1="95" x2="130" y2="170" style="display:none" />
                    <line id="arm-l" x1="130" y1="120" x2="100" y2="150" style="display:none" />
                    <line id="arm-r" x1="130" y1="120" x2="160" y2="150" style="display:none" />
                    <line id="leg-l" x1="130" y1="170" x2="100" y2="210" style="display:none" />
                    <line id="leg-r" x1="130" y1="170" x2="160" y2="210" style="display:none" />
                </svg>
            </div>

            <div id="keyboard-container">
                <div id="keyboard"></div>
            </div>
        </div>

        <div id="display-section">
            <div id="category-info">CATEGORIA</div>
            <div id="word-display">_ _ _ _ _</div>
        </div>
    </div>

    <footer>
        BOM JOGO!
    </footer>

    <button id="reset-btn" onclick="nextRound()">PRÓXIMA PALAVRA</button>

    <audio id="snd-acerto" src="estampido.ogg"></audio>
    <audio id="snd-erro" src="erro.ogg"></audio>
    <audio id="snd-vitoria" src="aplausos.ogg"></audio>
    <audio id="snd-bg" src="musica_fundo_sebran.ogg" loop></audio>

    <script>
        const database = {
            "ANIMAIS": ["CACHORRO", "GATO", "ELEFANTE", "GIRAFA", "LEÃO", "TIGRE", "ZEBRA", "MACACO", "COELHO", "RATO", "CAVALO", "VACA", "PORCO", "GALINHA", "PATO", "OVELHA", "BODE", "URSO", "LOBO", "RAPOSA", "ESQUILO", "CANGURU", "PANDA", "PINGUIM", "TUBARÃO", "BALEIA", "GOLFINHO", "TARTARUGA", "JACARÉ", "COBRA", "SAPO", "ABELHA", "FORMIGA", "BORBOLETA", "ARANHA", "ESCORPIÃO", "MORCEGO", "CORUJA", "ÁGUIA", "PAPAGAIO", "TUCANO", "AVESTRUZ", "CAMELO", "HIPOPÓTAMO", "RINOCERONTE", "ESQUILO", "CASTOR", "HAMSTER", "GUEPARDO", "COALA"],
            "CASA": ["CADEIRA", "MESA", "SOFÁ", "CAMA", "ARMÁRIO", "GELADEIRA", "FOGÃO", "TELEVISÃO", "JANELA", "PORTA", "TAPETE", "CORTINA", "LÂMPADA", "ESPELHO", "TRAVESSEIRO", "LENÇOL", "TOALHA", "CHUVEIRO", "VASO", "PIA", "COPO", "PRATO", "TALHER", "PANELA", "VASSOURA", "BALDE", "RELOGIO", "QUADRO", "ESTANTE", "MICROONDAS", "GARFO", "FACA", "COLHER", "XÍCARA", "BULE", "FRIGIDEIRA", "ABAJUR", "COBERTOR", "CABIDE", "PENTE"],
            "PAÍSES": ["BRASIL", "ARGENTINA", "CHILE", "MÉXICO", "CANADÁ", "ESTADOS UNIDOS", "PORTUGAL", "ESPANHA", "FRANÇA", "ITÁLIA", "ALEMANHA", "INGLATERRA", "JAPÃO", "CHINA", "EGITO", "AUSTRÁLIA", "RÚSSIA", "ÍNDIA", "ANGOLA", "GRÉCIA", "URUGUAI", "PARAGUAI", "PERU", "COLÔMBIA", "CANADÁ", "MÉXICO", "NORUEGA", "SUÉCIA", "EGITO", "MARROCOS"],
            "ALIMENTOS": ["BANANA", "MAÇÃ", "LARANJA", "UVA", "MORANGO", "MELANCIA", "ABACAXI", "PERA", "MAMÃO", "LIMÃO", "BATATA", "CENOURA", "TOMATE", "ALFACE", "FEIJÃO", "ARROZ", "MACARRÃO", "CARNE", "OVO", "LEITE", "PÃO", "QUEIJO", "BOLO", "BISCOITO", "SUCO", "PIPOCA", "GELATINA", "CHOCOLATE", "PIZZA", "HAMBÚRGUER"],
            "PROFISSÕES": ["PROFESSOR", "MÉDICO", "DENTISTA", "POLICIAL", "BOMBEIRO", "PADEIRO", "MOTORISTA", "COZINHEIRO", "PINTOR", "PEDREIRO", "CARPINTEIRO", "MECÂNICO", "VENDEDOR", "ARTISTA", "CANTOR", "Dançarino", "ATLETA", "JORNALISTA", "CIENTISTA", "ASTRONAUTA", "VETERINÁRIO", "ADVOGADO", "PILOTO", "CARTEIRO", "JARDINEIRO"],
            "CORPO HUMANO": ["CABEÇA", "OMBRO", "JOELHO", "PÉ", "OLHO", "OUVIDO", "BOCA", "NARIZ", "MÃO", "DEDO", "BRAÇO", "PERNA", "BARRIGA", "COSTA", "PESCOÇO", "DENTE", "LÍNGUA", "UNHA", "CABELO", "CORAÇÃO", "PULMÃO", "ESTÔMAGO", "CÉREBRO", "SANGUE", "OSSO"]
        };

        let currentWordRaw = ""; 
        let currentWordNormalized = ""; 
        let currentCategory = "";
        let guessedLetters = [];
        let mistakes = 0;
        let musicPlaying = false;
        const bodyParts = ['head-group', 'body', 'arm-l', 'arm-r', 'leg-l', 'leg-r'];

        function playSnd(id) {
            const snd = document.getElementById(id);
            snd.currentTime = 0;
            snd.play().catch(e => {});
        }

        function toggleMusic() {
            const bg = document.getElementById('snd-bg');
            const btn = document.getElementById('bg-music-btn');
            if (!musicPlaying) { bg.play(); btn.innerText = "SOM: ON"; }
            else { bg.pause(); btn.innerText = "SOM: OFF"; }
            musicPlaying = !musicPlaying;
        }

        function normalize(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
        }

        function initGame() {
            const categories = Object.keys(database);
            currentCategory = categories[Math.floor(Math.random() * categories.length)];
            const wordsInCategory = database[currentCategory];
            currentWordRaw = wordsInCategory[Math.floor(Math.random() * wordsInCategory.length)].toUpperCase();
            
            currentWordNormalized = normalize(currentWordRaw);
            guessedLetters = [];
            mistakes = 0;

            document.getElementById('category-info').innerText = "CATEGORIA: " + currentCategory;
            document.getElementById('reset-btn').style.display = "none";
            document.getElementById('dead-details').style.display = "none";
            bodyParts.forEach(p => document.getElementById(p).style.display = "none");
            
            renderWord();
            renderKeyboard();
            document.getElementById('message').innerText = "";
        }

        function renderWord() {
            const container = document.getElementById('word-display');
            let displayStr = "";
            let winCounter = 0;
            for (let i = 0; i < currentWordRaw.length; i++) {
                const charRaw = currentWordRaw[i];
                const charNorm = currentWordNormalized[i];
                if (charRaw === " " || charRaw === "-") {
                    displayStr += charRaw === " " ? "\u00A0\u00A0" : "- ";
                } else if (guessedLetters.includes(charNorm)) {
                    displayStr += charRaw + " ";
                } else {
                    displayStr += "_ ";
                    winCounter++;
                }
            }
            container.innerText = displayStr;
            if (winCounter === 0) endGame(true);
        }

        function renderKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = "";
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
                const b = document.createElement('button');
                b.innerText = l;
                b.className = 'key';
                b.id = 'k-' + l;
                b.onclick = () => handleGuess(l);
                kb.appendChild(b);
            });
        }

        function handleGuess(l) {
            if (guessedLetters.includes(l) || mistakes >= 6) return;
            document.getElementById('k-' + l).disabled = true;

            if (currentWordNormalized.includes(l)) {
                guessedLetters.push(l);
                playSnd('snd-acerto');
                renderWord();
            } else {
                mistakes++;
                playSnd('snd-erro');
                document.getElementById(bodyParts[mistakes-1]).style.display = "block";
                if (mistakes === 6) {
                    document.getElementById('dead-details').style.display = "block";
                    endGame(false);
                }
            }
        }

        function endGame(win) {
            const msg = document.getElementById('message');
            if (win) {
                playSnd('snd-vitoria');
                msg.innerText = "PARABÉNS!";
                msg.style.color = "#44ff44";
            } else {
                msg.innerText = "OPS! A PALAVRA ERA: " + currentWordRaw;
                msg.style.color = "#ff4444";
                document.getElementById('word-display').innerText = currentWordRaw.split('').join(' ');
            }
            document.getElementById('reset-btn').style.display = "block";
        }

        function nextRound() { initGame(); }
        initGame();
    </script>
</body>
</html>
