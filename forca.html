<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EdHumanas - Forca Educativa</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            padding: 5px 15px;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px;
            flex-shrink: 0;
        }

        h1 { font-size: 1.1rem; margin: 0; letter-spacing: 2px; }

        .audio-controls { display: flex; gap: 8px; align-items: center; }
        #stats { font-size: 0.8rem; }

        .audio-btn {
            background: none;
            border: 1.5px solid #fff;
            color: #fff;
            padding: 4px 8px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            font-size: 0.7rem;
        }

        .audio-btn.active { background-color: #fff; color: #000; }

        /* Área Central Ajustada */
        main {
            display: flex;
            flex: 1;
            align-items: flex-start; /* Alinha ao topo para ganhar espaço embaixo */
            justify-content: space-around;
            gap: 10px;
            min-height: 0;
            padding-top: 10px;
        }

        #hangman-container {
            flex: 0.8; /* Diminuído para dar mais espaço ao teclado */
            height: 60%; /* Altura reduzida para subir o layout */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #hangman-svg {
            height: 100%;
            width: auto;
        }

        #keyboard-container {
            flex: 1.2;
            max-width: 450px;
            margin-top: 10px;
        }

        #keyboard {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .key {
            background-color: #111;
            color: #fff;
            border: 1.5px solid #fff;
            padding: 10px 0;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
        }

        .key:disabled { opacity: 0.2; border-color: #444; }

        /* Rodapé Reforçado */
        footer {
            height: 140px; /* Aumentado para garantir visibilidade */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-top: 2px solid #333;
            flex-shrink: 0;
            background-color: #000;
            z-index: 10;
        }

        #word-display {
            font-size: 2.2rem;
            letter-spacing: 8px;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            word-wrap: break-word;
            width: 100%;
            color: #fff;
            margin-top: 10px;
        }

        #message {
            height: 20px;
            font-size: 1rem;
            color: #ff4444;
            font-weight: bold;
        }

        line, circle, path {
            stroke: #fff;
            stroke-width: 6;
            fill: none;
        }

        .dead-face { stroke: #ff4444 !important; }

        #reset-btn {
            position: fixed;
            top: 40%; /* Subiu um pouco */
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #fff;
            color: #000;
            border: none;
            font-weight: bold;
            z-index: 100;
            display: none;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        /* Ajustes Mobile/Tablet Vertical */
        @media (max-width: 768px) {
            main { flex-direction: column; align-items: center; }
            #hangman-container { height: 30%; flex: none; }
            #keyboard-container { width: 100%; max-width: 100%; }
            #keyboard { grid-template-columns: repeat(9, 1fr); }
            #word-display { font-size: 1.6rem; letter-spacing: 4px; }
            footer { height: 120px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>FORCA</h1>
        <div class="audio-controls">
            <div id="stats">PALAVRAS: <span id="count">100</span></div>
            <button id="bg-music-btn" class="audio-btn" onclick="toggleMusic()">SOM: DESLIGADO</button>
        </div>
    </header>

    <main>
        <div id="hangman-container">
            <svg id="hangman-svg" viewBox="0 0 200 250">
                <line x1="20" y1="230" x2="180" y2="230" />
                <line x1="50" y1="230" x2="50" y2="20" />
                <line x1="50" y1="20" x2="130" y2="20" />
                <line x1="130" y1="20" x2="130" y2="50" />
                <g id="head-group" style="display:none">
                    <circle id="head-circle" cx="130" cy="75" r="20" />
                    <g id="dead-details" style="display:none">
                        <line x1="120" y1="65" x2="128" y2="73" class="dead-face" />
                        <line x1="128" y1="65" x2="120" y2="73" class="dead-face" />
                        <line x1="132" y1="65" x2="140" y2="73" class="dead-face" />
                        <line x1="140" y1="65" x2="132" y2="73" class="dead-face" />
                        <path d="M 120 85 Q 130 75 140 85" class="dead-face" />
                    </g>
                </g>
                <line id="body" x1="130" y1="95" x2="130" y2="170" style="display:none" />
                <line id="arm-l" x1="130" y1="120" x2="100" y2="150" style="display:none" />
                <line id="arm-r" x1="130" y1="120" x2="160" y2="150" style="display:none" />
                <line id="leg-l" x1="130" y1="170" x2="100" y2="210" style="display:none" />
                <line id="leg-r" x1="130" y1="170" x2="160" y2="210" style="display:none" />
            </svg>
        </div>

        <div id="keyboard-container">
            <div id="keyboard"></div>
        </div>
    </main>

    <footer>
        <div id="message"></div>
        <div id="word-display">_ _ _ _ _</div>
    </footer>

    <button id="reset-btn" onclick="nextRound()">PRÓXIMA PALAVRA</button>

    <audio id="snd-acerto" src="estampido.ogg"></audio>
    <audio id="snd-erro" src="erro.ogg"></audio>
    <audio id="snd-vitoria" src="aplausos.ogg"></audio>
    <audio id="snd-bg" src="musica_fundo_sebran.ogg" loop></audio>

    <script>
        // O código JavaScript permanece o mesmo que o anterior (lógica de acentuação e espaços)
        const words = ["AMARELINHA", "BONECA", "CARRINHO", "PETECA", "PEÃO", "PULA CORDA", "ESCONDE-ESCONDE", "PEGA-PEGA", "PIPA", "IOIÔ", "BALANÇO", "ESCORREGADOR", "GIRA-GIRA", "DOMINÓ", "XADREZ", "DAMA", "LUDO", "QUEBRA-CABEÇA", "MASSINHA", "AQUARELA", "CINDERELA", "PINÓQUIO", "BRANCA DE NEVE", "RAPUNZEL", "ALADDIN", "PETER PAN", "SININHO", "O GATO DE BOTAS", "JOÃO E MARIA", "LOBO MAU", "CHAPEUZINHO VERMELHO", "OS TRÊS PORQUINHOS", "O PATO FEIO", "A BELA E A FERA", "A PEQUENA SEREIA", "REI LEÃO", "POCAHONTAS", "MULAN", "TARZAN", "ALICE", "FADA MADRINHA", "PALHAÇO", "MÁGICO", "BAMBOLÊ", "CATAVENTO", "BOLINHA DE SABÃO", "QUEIMADA", "CABO DE GUERRA", "ESTÁTUA", "PASSANEL", "TELEFONE SEM FIO", "BATATA QUENTE", "CADEIRAS", "CORRE COTIA", "PULA-PULA", "LEGO", "BARBIE", "PELÚCIA", "MARIONETE", "FANTOCHE", "DEDOCHE", "CASTELO", "DRAGÃO", "PRINCESA", "PRÍNCIPE", "PIRATA", "UNICÓRNIO"];
        
        let availableWords = [...words]; 
        let currentWordRaw = ""; 
        let currentWordNormalized = ""; 
        let guessedLetters = [];
        let mistakes = 0;
        let musicPlaying = false;
        const bodyParts = ['head-group', 'body', 'arm-l', 'arm-r', 'leg-l', 'leg-r'];

        function playSnd(id) {
            const snd = document.getElementById(id);
            snd.currentTime = 0;
            snd.play().catch(e => console.log("Áudio bloqueado"));
        }

        function toggleMusic() {
            const bg = document.getElementById('snd-bg');
            const btn = document.getElementById('bg-music-btn');
            if (!musicPlaying) {
                bg.play();
                btn.innerText = "SOM: LIGADO";
                btn.classList.add('active');
            } else {
                bg.pause();
                btn.innerText = "SOM: DESLIGADO";
                btn.classList.remove('active');
            }
            musicPlaying = !musicPlaying;
        }

        function normalize(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
        }

        function initGame() {
            if (availableWords.length === 0) {
                document.getElementById('message').innerText = "VOCÊ VENCEU!";
                return;
            }
            const idx = Math.floor(Math.random() * availableWords.length);
            currentWordRaw = availableWords.splice(idx, 1)[0].toUpperCase();
            currentWordNormalized = normalize(currentWordRaw);
            guessedLetters = [];
            mistakes = 0;
            document.getElementById('count').innerText = availableWords.length;
            document.getElementById('reset-btn').style.display = "none";
            document.getElementById('dead-details').style.display = "none";
            document.getElementById('head-circle').classList.remove('dead-face');
            bodyParts.forEach(p => document.getElementById(p).style.display = "none");
            renderWord();
            renderKeyboard();
            document.getElementById('message').innerText = "";
        }

        function renderWord() {
            const container = document.getElementById('word-display');
            let displayStr = "";
            let winCounter = 0;
            for (let i = 0; i < currentWordRaw.length; i++) {
                const charRaw = currentWordRaw[i];
                const charNorm = currentWordNormalized[i];
                if (charRaw === " " || charRaw === "-") {
                    displayStr += charRaw === " " ? "\u00A0\u00A0" : "- ";
                } else if (guessedLetters.includes(charNorm)) {
                    displayStr += charRaw + " ";
                } else {
                    displayStr += "_ ";
                    winCounter++;
                }
            }
            container.innerText = displayStr;
            if (winCounter === 0) endGame(true);
        }

        function renderKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = "";
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
                const b = document.createElement('button');
                b.innerText = l;
                b.className = 'key';
                b.id = 'k-' + l;
                b.onclick = () => handleGuess(l);
                kb.appendChild(b);
            });
        }

        function handleGuess(l) {
            if (guessedLetters.includes(l) || mistakes >= 6) return;
            const btn = document.getElementById('k-' + l);
            if (btn) btn.disabled = true;
            if (currentWordNormalized.includes(l)) {
                guessedLetters.push(l);
                playSnd('snd-acerto');
                renderWord();
            } else {
                mistakes++;
                playSnd('snd-erro');
                document.getElementById(bodyParts[mistakes-1]).style.display = "block";
                if (mistakes === 6) {
                    document.getElementById('dead-details').style.display = "block";
                    document.getElementById('head-circle').classList.add('dead-face');
                    endGame(false);
                }
            }
        }

        function endGame(win) {
            const msg = document.getElementById('message');
            if (win) {
                playSnd('snd-vitoria');
                msg.innerText = "PARABÉNS!";
                msg.style.color = "#44ff44";
            } else {
                msg.innerText = "A PALAVRA ERA: " + currentWordRaw;
                msg.style.color = "#ff4444";
                document.getElementById('word-display').innerText = currentWordRaw.split('').join(' ');
            }
            document.getElementById('reset-btn').style.display = "block";
        }

        function nextRound() { initGame(); }

        window.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            if (/^[A-Z]$/.test(key)) handleGuess(key);
        });

        initGame();
    </script>
</body>
</html>
