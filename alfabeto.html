<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forca Educativa</title>

<style>
* { box-sizing: border-box; touch-action: manipulation; }

body {
    background-color: #000;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh; /* CORRIGIDO */
    margin: 0;
    padding: 10px;
    overflow-x: hidden; /* CORRIGIDO */
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

h1 { font-size: 1.3rem; }

/* MAIN */
main {
    display: flex;
    flex: 1;
    gap: 15px;
    align-items: center;
    justify-content: space-around;
}

/* FORCA */
#hangman-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

#hangman-svg {
    max-width: 100%;
    height: auto;
}

/* TECLADO */
#keyboard-container {
    flex: 1;
    max-width: 500px;
    width: 100%;
}

#keyboard {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
}

.key {
    background: #111;
    color: #fff;
    border: 2px solid #fff;
    padding: 12px;
    font-size: 1.1rem;
    border-radius: 8px;
}

.key:disabled {
    opacity: 0.3;
}

/* FOOTER (PALAVRA) */
footer {
    margin-top: 10px;
    padding: 10px;
    border-top: 2px solid #333;
    text-align: center;
}

#word-display {
    font-size: 2rem;
    letter-spacing: 8px;
    font-weight: bold;
    word-wrap: break-word;
}

/* RESPONSIVO */
@media (max-width: 1024px) {
    main {
        flex-direction: column;
        justify-content: flex-start;
    }

    #hangman-container {
        height: 30%;
    }

    #keyboard {
        grid-template-columns: repeat(9, 1fr);
    }

    #word-display {
        font-size: 1.8rem;
    }
}

@media (max-width: 600px) {
    #word-display {
        font-size: 1.5rem;
        letter-spacing: 5px;
    }
}
</style>
</head>

<body>

<header>
    <h1>FORCA</h1>
</header>

<main>

<div id="hangman-container">
<svg id="hangman-svg" viewBox="0 0 200 250">
    <line x1="20" y1="230" x2="180" y2="230"/>
    <line x1="50" y1="230" x2="50" y2="20"/>
    <line x1="50" y1="20" x2="130" y2="20"/>
    <line x1="130" y1="20" x2="130" y2="50"/>
    <circle id="head" cx="130" cy="75" r="20" style="display:none"/>
    <line id="body" x1="130" y1="95" x2="130" y2="170" style="display:none"/>
    <line id="arm1" x1="130" y1="120" x2="100" y2="150" style="display:none"/>
    <line id="arm2" x1="130" y1="120" x2="160" y2="150" style="display:none"/>
    <line id="leg1" x1="130" y1="170" x2="100" y2="210" style="display:none"/>
    <line id="leg2" x1="130" y1="170" x2="160" y2="210" style="display:none"/>
</svg>
</div>

<div id="keyboard-container">
<div id="keyboard"></div>
</div>

</main>

<footer>
<div id="word-display"></div>
</footer>

<script>

const words = ["XADREZ","ESCOLA","BRASIL","PROFESSOR","ALUNO","EDUCACAO"];
let word = "";
let guessed = [];
let mistakes = 0;

const parts = ["head","body","arm1","arm2","leg1","leg2"];

function start() {
    word = words[Math.floor(Math.random()*words.length)];
    guessed = [];
    mistakes = 0;
    parts.forEach(p => document.getElementById(p).style.display="none");
    renderWord();
    renderKeyboard();
}

function renderWord() {
    let display = "";
    let win = true;

    for (let l of word) {
        if (guessed.includes(l)) {
            display += l + " ";
        } else {
            display += "_ ";
            win = false;
        }
    }

    document.getElementById("word-display").innerText = display;

    if (win) setTimeout(()=>alert("Ganhou!"),100);
}

function renderKeyboard() {
    const kb = document.getElementById("keyboard");
    kb.innerHTML = "";

    "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
        const btn = document.createElement("button");
        btn.innerText = l;
        btn.className = "key";
        btn.onclick = () => guess(l, btn);
        kb.appendChild(btn);
    });
}

function guess(letter, btn) {
    btn.disabled = true;

    if (word.includes(letter)) {
        guessed.push(letter);
    } else {
        document.getElementById(parts[mistakes]).style.display="block";
        mistakes++;

        if (mistakes === 6) {
            setTimeout(()=>alert("Perdeu! Palavra: " + word),100);
        }
    }

    renderWord();
}

start();

</script>

</body>
</html>
