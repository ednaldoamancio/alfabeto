<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Famílias Silábicas - EdHumanas</title>
    
    <style>
        :root {
            --primary: #1e88e5;
            --secondary: #ffb74d;
            --text-light: #ffffff;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', Tahoma, sans-serif;
            background: #000;
            color: var(--text-light);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: fixed;
        }

        @media (hover: hover) and (pointer: fine) {
            body {
                cursor: none;
            }
        }

        .custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.05s ease;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
        }
        
        .custom-cursor::before {
            content: "🎣";
            font-size: 35px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        @media (hover: none) and (pointer: coarse) {
            .custom-cursor {
                display: none;
            }
        }

        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.75;
        }

        #game-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        
        .icon-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--secondary);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            transition: transform 0.2s;
        }
        
        @media (min-width: 768px) {
            .icon-btn {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }
            .top-bar {
                top: 20px;
                left: 20px;
                gap: 15px;
            }
        }

        .game-info-container {
            width: 100%;
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
            pointer-events: none;
        }

        .game-info {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 15px;
            border-radius: 30px;
            border: 2px solid var(--primary);
            font-weight: bold;
            font-size: 11px;
            backdrop-filter: blur(4px);
            flex-wrap: wrap;
            justify-content: center;
        }
        
        @media (min-width: 768px) {
            .game-info {
                gap: 20px;
                padding: 10px 25px;
                font-size: 18px;
            }
        }
        
        @media (min-width: 1024px) {
            .game-info {
                gap: 30px;
                padding: 10px 30px;
                font-size: 22px;
            }
        }
        
        .timer {
            background: #000000aa;
            padding: 4px 12px;
            border-radius: 30px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .instrucao { 
            font-size: 16px;
            font-weight: 900;
            margin-top: 8px;
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: baseline;
            gap: 6px;
            cursor: pointer;
            pointer-events: auto;
        }
        
        @media (min-width: 768px) {
            .instrucao {
                font-size: 24px;
                margin-top: 15px;
                padding: 8px 20px;
                gap: 10px;
            }
        }
        
        @media (min-width: 1024px) {
            .instrucao {
                font-size: 28px;
                padding: 8px 24px;
                gap: 12px;
            }
        }
        
        #silabaAlvo {
            color: var(--secondary);
            font-size: 28px;
            font-weight: bold;
            background: #000000aa;
            padding: 0 10px;
            border-radius: 30px;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #ff9800;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.15s ease, text-shadow 0.15s ease;
        }
        
        #silabaAlvo.pulsando {
            transform: scale(1.25);
            text-shadow: 0 0 18px #ffca28, 0 0 6px #ff9800;
        }
        
        .speaker-icon {
            font-size: 14px;
            opacity: 0.7;
            cursor: pointer;
        }
        
        @media (min-width: 768px) {
            .speaker-icon {
                font-size: 22px;
            }
        }

        .oceano {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            overflow: hidden;
            pointer-events: auto;
        }

        .peixinho {
            position: absolute;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
            pointer-events: auto;
            transition: filter 0.1s;
        }
        
        @media (min-width: 768px) {
            .peixinho {
                width: 100px;
                height: 100px;
            }
        }
        
        @media (min-width: 1024px) {
            .peixinho {
                width: 120px;
                height: 120px;
            }
        }
        
        .peixe-corpo {
            font-size: 50px;
            position: absolute;
            z-index: 1;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
        }
        
        @media (min-width: 768px) {
            .peixe-corpo {
                font-size: 75px;
            }
        }
        
        @media (min-width: 1024px) {
            .peixe-corpo {
                font-size: 90px;
            }
        }
        
        .silaba-peixe {
            font-size: 18px;
            font-weight: bold;
            color: #fff9c4;
            position: absolute;
            z-index: 2;
            text-shadow: 2px 2px 0 #0a2f5a;
            font-family: 'Courier New', monospace;
        }
        
        @media (min-width: 768px) {
            .silaba-peixe {
                font-size: 26px;
            }
        }
        
        @media (min-width: 1024px) {
            .silaba-peixe {
                font-size: 30px;
            }
        }

        .pescado {
            animation: subir-vertical 0.7s ease-in forwards !important;
            pointer-events: none;
            z-index: 50;
        }

        @keyframes subir-vertical {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
        }

        @keyframes nadar-direita {
            0% { left: -100px; }
            100% { left: 100%; }
        }
        @keyframes nadar-esquerda {
            0% { left: 100%; }
            100% { left: -100px; }
        }
        
        @media (min-width: 768px) {
            @keyframes nadar-direita {
                0% { left: -150px; }
                100% { left: 100%; }
            }
            @keyframes nadar-esquerda {
                0% { left: 100%; }
                100% { left: -150px; }
            }
        }

        .bolha {
            position: absolute;
            bottom: -50px;
            background: radial-gradient(circle, rgba(255,255,255,0.6), rgba(100,200,255,0.2));
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
            animation: subir-bolha linear forwards;
        }
        @keyframes subir-bolha {
            to { transform: translateY(-120vh) translateX(40px); opacity: 0; }
        }

        #modal-vitoria, #modal-navegacao {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,20,45,0.96);
            backdrop-filter: blur(14px);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        
        .vitoria-texto {
            font-size: 4vh;
            color: var(--secondary);
            font-weight: bold;
            margin: 15px 0;
        }
        
        @media (min-width: 768px) {
            .vitoria-texto {
                font-size: 5vh;
                margin: 20px 0;
            }
        }
        
        .icone-vitoria { font-size: 10vh; margin-bottom: 15px; animation: float 2s infinite; }
        @media (min-width: 768px) {
            .icone-vitoria { font-size: 15vh; margin-bottom: 20px; }
        }
        
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
        
        .score-panel { 
            font-size: 16px; 
            background: #1e2a3a; 
            padding: 8px 20px; 
            border-radius: 40px; 
            margin-top: 15px; 
            border: 1px solid var(--secondary);
        }
        
        @media (min-width: 768px) {
            .score-panel { 
                font-size: 24px; 
                padding: 12px 28px; 
                border-radius: 60px; 
                margin-top: 20px;
            }
        }
        
        .tempo-record {
            font-size: 14px;
            margin-top: 10px;
            color: #ffca28;
        }

        .erro-anim {
            animation: tremer 0.4s ease;
            filter: grayscale(0.5) brightness(0.7);
        }
        @keyframes tremer {
            25% { transform: translateX(-8px) rotate(-2deg); }
            75% { transform: translateX(8px) rotate(2deg); }
            100% { transform: translateX(0); }
        }
        
        .feedback-correto {
            position: fixed;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            background: #2e7d32dd;
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            z-index: 200;
            animation: fadeUp 0.8s ease-out forwards;
            pointer-events: none;
            white-space: nowrap;
        }
        
        @media (min-width: 768px) {
            .feedback-correto {
                bottom: 20%;
                padding: 12px 24px;
                font-size: 28px;
            }
        }
        
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-40px); }
        }
        
        .star-point {
            position: absolute;
            font-size: 30px;
            pointer-events: none;
            z-index: 150;
            animation: estrelaPular 0.6s ease-out forwards;
        }
        
        @keyframes estrelaPular {
            0% { transform: scale(0.2) translateY(0); opacity: 1; }
            100% { transform: scale(1.2) translateY(-70px); opacity: 0; }
        }
        
        .progresso-familia {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 9px;
            backdrop-filter: blur(5px);
            font-weight: bold;
            pointer-events: none;
        }
        
        @media (min-width: 768px) {
            .progresso-familia {
                bottom: 20px;
                right: 20px;
                padding: 8px 16px;
                font-size: 14px;
                border-radius: 30px;
            }
        }
        
        .btn-voltar-alfabeto {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: linear-gradient(135deg, #ab47bc, #7b1fa2);
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            font-family: inherit;
            backdrop-filter: blur(4px);
            animation: pulse-glow-purple 2s infinite;
        }
        
        @media (min-width: 768px) {
            .btn-voltar-alfabeto {
                bottom: 30px;
                left: 30px;
                padding: 14px 28px;
                font-size: 18px;
                gap: 12px;
            }
        }
        
        .btn-voltar-alfabeto:active {
            transform: scale(0.95);
        }
        
        @keyframes pulse-glow-purple {
            0% { box-shadow: 0 0 0 0 rgba(171, 71, 188, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(171, 71, 188, 0); }
            100% { box-shadow: 0 0 0 0 rgba(171, 71, 188, 0); }
        }
        
        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        @media (min-width: 768px) {
            .nav-buttons {
                gap: 30px;
                margin-top: 30px;
            }
        }
        
        .nav-btn {
            background: linear-gradient(135deg, var(--primary), #7b1fa2);
            border: 2px solid var(--secondary);
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-family: inherit;
        }
        
        @media (min-width: 768px) {
            .nav-btn {
                padding: 15px 35px;
                font-size: 24px;
                border-radius: 60px;
            }
        }
        
        .nav-btn.cancelar {
            background: linear-gradient(135deg, #555, #333);
            border-color: #888;
        }
        
        .nav-btn.confirmar {
            background: linear-gradient(135deg, #ff8c00, #ff5722);
        }
        
        .dica-som {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.5);
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 9px;
            color: #aaa;
            pointer-events: none;
        }
    </style>
</head>
<body>

<video autoplay loop muted playsinline id="bg-video">
    <source src="video_mar.mp4" type="video/mp4">
</video>

<audio id="bg-audio" src="som_fundo_do_mar.mp3" loop></audio>
<audio id="sfx-pescado" src="pescado.ogg"></audio>
<audio id="sfx-erro" src="erro.mp3"></audio>

<div id="game-wrapper">
    <div class="top-bar">
        <button class="icon-btn" onclick="window.location.href='index.html'">⬅️</button>
        <button id="btn-audio" class="icon-btn" onclick="toggleAudio()">🔇</button>
        <button class="icon-btn" onclick="toggleFullscreen()">⛶</button>
    </div>

    <div class="game-info-container">
        <div class="game-info">
            <div>📚 Etapa: <span id="faseText">1</span>/3</div>
            <div>🏆 Pontos: <span id="pontosText">0</span></div>
            <div>🎯 Progresso: <span id="acertosFase">0</span>/<span id="totalEtapa">0</span></div>
            <div>🔤 Família: <span id="familiaAtual">B</span></div>
            <div class="timer">⏱️ <span id="timerDisplay">00:00</span></div>
        </div>
        <p class="instrucao" id="btnRepetirSilaba">
            🐠 Pesque a sílaba: <span id="silabaAlvo">---</span> 🔊
        </p>
    </div>
    <div class="oceano" id="aquario"></div>
    <div class="progresso-familia" id="progressHint">🌟 B → BA, BE, BI, BO, BU, BÃO</div>
    
    <button class="btn-voltar-alfabeto" id="btnVoltarAlfabeto">
        <span>🔤</span> Voltar ao Alfabeto
    </button>
    
    <div class="dica-som">💡 Clique na sílaba para ouvi-la</div>
</div>

<div id="modal-vitoria">
    <div class="icone-vitoria">🎣✨</div>
    <div class="vitoria-texto" id="vitoria-msg-topo">Parabéns!</div>
    <div class="score-panel" id="scoreFinalModal">Pontuação: 0</div>
    <div class="tempo-record" id="tempoEtapa"></div>
    <div class="vitoria-texto" id="vitoria-msg-sub" style="font-size: 2.5vh; color: #fff;">Preparando próximo nível...</div>
</div>

<div id="modal-navegacao">
    <div class="icone-vitoria">🔤➡️🐟</div>
    <div class="vitoria-texto" style="font-size: 3.5vh;">Voltar para o jogo do alfabeto?</div>
    <div class="nav-buttons">
        <button class="nav-btn cancelar" id="btnCancelarVolta">❌ Ficar nas sílabas</button>
        <button class="nav-btn confirmar" id="btnConfirmarVolta">🔤 Voltar ao alfabeto</button>
    </div>
</div>

<script>
    // ========== FAMÍLIAS SILÁBICAS ==========
    const familiasCompletas = [

    const pronunciaMap = {

    let audioEnabled = false;
    let currentUtterance = null;
    let jogoAtivo = true;
    let aguardandoProxima = false;
    let faseAtual = 1;
    let pontuacaoTotal = 0;
    let acertosNaEtapa = 0;
    let filaSilabas = [];
    let indiceSilabaAtual = 0;
    let familiaCorrente = "B";
    let peixesNaTela = window.innerWidth < 768 ? 3 : (window.innerWidth < 1024 ? 4 : 5);
    
    // Tempos por etapa
    let temposEtapas = [0, 0, 0];
    let tempoInicioEtapa = null;
    let intervaloRelogio = null;
    
    const bgAudio = document.getElementById("bg-audio");
    const sfxPescado = document.getElementById("sfx-pescado");
    const sfxErro = document.getElementById("sfx-erro");
    const btnAudio = document.getElementById("btn-audio");
    const aquario = document.getElementById("aquario");
    const modalVitoria = document.getElementById("modal-vitoria");
    const modalNavegacao = document.getElementById("modal-navegacao");
    
    // ========== FUNÇÃO DE FALA (MESMA DO JOGO DE LETRAS) ==========
    function falar(texto, callback) {
        if (!window.speechSynthesis) { if (callback) callback(); return; }
        if (currentUtterance) window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang  = 'pt-BR';
        utterance.rate  = 0.85;
        utterance.pitch = 1.0;

        const voices = window.speechSynthesis.getVoices();
        const ptBrVoice = voices.find(v => v.lang === 'pt-BR' &&
            (v.name.includes('Google') || v.name.includes('Microsoft') ||
             v.name.includes('Maria')  || v.name.includes('Natural')));
        if (ptBrVoice) utterance.voice = ptBrVoice;

        currentUtterance = utterance;
        utterance.onend = () => {
            currentUtterance = null;
            if (callback) setTimeout(callback, 150);
        };
        window.speechSynthesis.speak(utterance);
    }

    function falarSilaba(silaba, callback) {
        const pronuncia = pronunciaMap[silaba.toUpperCase()] || silaba.toLowerCase();
        falar(pronuncia, callback);
    }

    function falarMensagem(msg, callback) {
        falar(msg, callback);
    }

    function falarParabensESilaba(silaba, callback) {
        const pronuncia = pronunciaMap[silaba.toUpperCase()] || silaba.toLowerCase();
        falar(`Muito bem! ${pronuncia}`, callback);
    }
    
    // ========== CRONÔMETRO ==========
    function formatarTempo(segundos) {
        const mins = Math.floor(segundos / 60);
        const secs = segundos % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }
    
    function iniciarCronometro() {
        if (intervaloRelogio) clearInterval(intervaloRelogio);
        tempoInicioEtapa = Date.now();
        document.getElementById("timerDisplay").innerText = "00:00";
        intervaloRelogio = setInterval(() => {
            if (tempoInicioEtapa && jogoAtivo && !aguardandoProxima) {
                const segundos = Math.floor((Date.now() - tempoInicioEtapa) / 1000);
                document.getElementById("timerDisplay").innerText = formatarTempo(segundos);
            }
        }, 1000);
    }
    
    function pararCronometro() {
        if (intervaloRelogio) {
            clearInterval(intervaloRelogio);
            intervaloRelogio = null;
        }
        if (tempoInicioEtapa) {
            return Math.floor((Date.now() - tempoInicioEtapa) / 1000);
        }
        return 0;
    }
    
    function resetarCronometro() {
        if (intervaloRelogio) clearInterval(intervaloRelogio);
        tempoInicioEtapa = null;
        document.getElementById("timerDisplay").innerText = "00:00";
    }
    
    // ========== CORREÇÃO: FUNÇÃO PARA REPETIR A SÍLABA ALVO ==========
    function repetirSilabaAlvo() {
        const elSilaba = document.getElementById("silabaAlvo");
        const silabaAtual = elSilaba.innerText;
        if (!silabaAtual || silabaAtual === "---") return;

        // Efeito visual de pulso (como nas letras)
        elSilaba.classList.add("pulsando");
        setTimeout(() => elSilaba.classList.remove("pulsando"), 300);

        // Fala a sílaba
        falarSilaba(silabaAtual);
    }
    
    const etapas = [
        familiasCompletas.slice(0, 7),
        familiasCompletas.slice(7, 14),
        familiasCompletas.slice(14, 22)
    ];
    
    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }
    
    function toggleAudio() {
        audioEnabled = !audioEnabled;
        btnAudio.innerText = audioEnabled ? "🔊" : "🔇";
        if (audioEnabled) {
            bgAudio.play().catch(e => console.log("autoplay bloqueado"));
        } else {
            bgAudio.pause();
        }
    }
    
    function atualizarUI() {
        document.getElementById("faseText").innerHTML = faseAtual;
        document.getElementById("pontosText").innerHTML = pontuacaoTotal;
        document.getElementById("acertosFase").innerHTML = acertosNaEtapa;
        document.getElementById("totalEtapa").innerHTML = filaSilabas.length;
        document.getElementById("familiaAtual").innerHTML = familiaCorrente;
        let familiaObj = familiasCompletas.find(f => f.letra === familiaCorrente);
        if (familiaObj) document.getElementById("progressHint").innerHTML = `🐟 ${familiaCorrente} → ${familiaObj.silabas.join(" · ")}`;
    }
    
    function criarEfeitoBolhas(quantidade = 30) {
        const qtd = window.innerWidth < 768 ? 25 : quantidade;
        for(let i = 0; i < qtd; i++) {
            setTimeout(() => {
                const bolha = document.createElement("div");
                bolha.className = "bolha";
                const tam = Math.random() * (window.innerWidth < 768 ? 30 : 45) + 10 + "px";
                bolha.style.width = tam; bolha.style.height = tam;
                bolha.style.left = Math.random() * 100 + "vw";
                bolha.style.animationDuration = Math.random() * 2.5 + 2 + "s";
                document.body.appendChild(bolha);
                setTimeout(() => bolha.remove(), 4500);
            }, i * 30);
        }
    }
    
    function mostrarEstrela(x, y) {
        const star = document.createElement("div");
        star.className = "star-point";
        star.innerText = "⭐";
        star.style.left = (x - 20) + "px";
        star.style.top = (y - 20) + "px";
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 700);
    }
    
    function mostrarFeedback(texto, isAcerto) {
        const div = document.createElement("div");
        div.className = "feedback-correto";
        div.style.background = isAcerto ? "#2e7d32dd" : "#c62828dd";
        div.innerText = texto;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 850);
    }
    
    function construirFilaEtapa(etapaIndex) {
        let silabasOrdenadas = [];
        for (let fam of etapas[etapaIndex]) silabasOrdenadas.push(...fam.silabas);
        return silabasOrdenadas;
    }
    
    function iniciarEtapa() {
        if (faseAtual > 3) { finalizarJogoCompleto(); return; }
        filaSilabas = construirFilaEtapa(faseAtual - 1);
        if (filaSilabas.length === 0) { concluirEtapa(); return; }
        indiceSilabaAtual = 0;
        acertosNaEtapa = 0;
        const primeiraSilaba = filaSilabas[0];
        const fam = familiasCompletas.find(f => f.silabas.includes(primeiraSilaba));
        familiaCorrente = fam ? fam.letra : "?";
        atualizarUI();
        jogoAtivo = true;
        aguardandoProxima = false;
        resetarCronometro();
        iniciarCronometro();
        carregarProximaSilaba();
    }
    
    function atualizarFamiliaCorrente(silabaAlvo) {
        const encontrada = familiasCompletas.find(f => f.silabas.includes(silabaAlvo));
        if (encontrada) familiaCorrente = encontrada.letra;
        document.getElementById("familiaAtual").innerHTML = familiaCorrente;
        let familiaObj = familiasCompletas.find(f => f.letra === familiaCorrente);
        if (familiaObj) document.getElementById("progressHint").innerHTML = `🐟 ${familiaCorrente} → ${familiaObj.silabas.join(" · ")}`;
    }
    
    function carregarProximaSilaba() {
        if (indiceSilabaAtual >= filaSilabas.length) { concluirEtapa(); return; }
        const silabaCerta = filaSilabas[indiceSilabaAtual];
        document.getElementById("silabaAlvo").innerText = silabaCerta;
        atualizarFamiliaCorrente(silabaCerta);
        atualizarUI();
        aquario.innerHTML = "";
        let opcoes = [silabaCerta];
        let todasSilabasDaEtapa = [...filaSilabas];
        let distratores = todasSilabasDaEtapa.filter(s => s !== silabaCerta);
        if (distratores.length < peixesNaTela - 1) {
            const todas = familiasCompletas.flatMap(f => f.silabas);
            let extras = todas.filter(s => !opcoes.includes(s) && s !== silabaCerta);
            extras = extras.slice(0, peixesNaTela);
            opcoes.push(...extras);
        } else {
            distratores.sort(() => 0.5 - Math.random());
            opcoes.push(...distratores.slice(0, peixesNaTela - 1));
        }
        let finalOpcoes = [...new Set(opcoes)].slice(0, peixesNaTela);
        while(finalOpcoes.length < peixesNaTela) finalOpcoes.push("ZÃO");
        finalOpcoes.sort(() => Math.random() - 0.5);
        finalOpcoes.forEach(sil => criarPeixe(sil, silabaCerta));
        
        setTimeout(() => {
            if (jogoAtivo && !aguardandoProxima) {
                falarSilaba(silabaCerta);
            }
        }, 600);
    }
    
    function criarPeixe(silaba, silabaAlvo) {
        const peixe = document.createElement("div");
        peixe.className = "peixinho";
        peixe.style.top = Math.floor(Math.random() * 65 + 15) + "%";
        const direita = Math.random() > 0.5;
        const duracao = (Math.random() * 6) + 5;
        peixe.style.animation = direita ? `nadar-direita ${duracao}s linear infinite` : `nadar-esquerda ${duracao}s linear infinite`;
        const emoji = emojisPeixe[Math.floor(Math.random() * emojisPeixe.length)];
        const flip = direita ? 'transform: scaleX(-1);' : '';
        const fontSize = silaba.length > 3 ? "16px" : "20px";
        peixe.innerHTML = `<span class="peixe-corpo" style="${flip}">${emoji}</span><span class="silaba-peixe" style="font-size: ${fontSize};">${silaba}</span>`;
        
        const handleClick = (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (!jogoAtivo || aguardandoProxima) return;
            if (silaba === silabaAlvo) acertou(peixe, silaba);
            else errou(peixe, silaba);
        };
        
        peixe.addEventListener('click', handleClick);
        peixe.addEventListener('touchstart', handleClick, { passive: false });
        aquario.appendChild(peixe);
    }
    
    function acertou(peixeElem, silabaClicada) {
        if (!jogoAtivo) return;
        jogoAtivo = false;
        if (audioEnabled) { sfxPescado.currentTime = 0; sfxPescado.play().catch(e=>{}); }
        const rect = peixeElem.getBoundingClientRect();
        peixeElem.style.animation = "none";
        peixeElem.style.left = rect.left + "px";
        peixeElem.style.top = rect.top + "px";
        peixeElem.classList.add("pescado");
        pontuacaoTotal += 10;
        acertosNaEtapa++;
        atualizarUI();
        mostrarEstrela(rect.left + 30, rect.top + 30);
        mostrarFeedback(`✅ +10  ${silabaClicada}`, true);
        
        falarParabensESilaba(silabaClicada, () => {
            indiceSilabaAtual++;
            if (indiceSilabaAtual < filaSilabas.length) {
                jogoAtivo = true;
                carregarProximaSilaba();
            } else { 
                concluirEtapa(); 
            }
        });
    }
    
    function errou(peixeElem, silabaErrada) {
        if (!jogoAtivo) return;
        if (audioEnabled && sfxErro) { sfxErro.currentTime = 0; sfxErro.play().catch(e=>{}); }
        mostrarFeedback(`❌ ${silabaErrada}`, false);
        peixeElem.classList.add("erro-anim");
        setTimeout(() => peixeElem.classList.remove("erro-anim"), 500);
        falarSilaba(silabaErrada);
    }
    
    function concluirEtapa() {
        if (aguardandoProxima) return;
        
        const tempoEtapa = pararCronometro();
        temposEtapas[faseAtual - 1] = tempoEtapa;
        
        aguardandoProxima = true;
        jogoAtivo = false;
        aquario.innerHTML = "";
        criarEfeitoBolhas(40);
        
        let titulo = "";
        if (faseAtual === 1) titulo = "✨ Etapa 1 - Famílias B a H ✨";
        else if (faseAtual === 2) titulo = "🌟 Etapa 2 - Famílias J a Q 🌟";
        else titulo = "🏅 Etapa 3 - Famílias R a Z 🏅";
        
        document.getElementById("vitoria-msg-topo").innerHTML = titulo;
        document.getElementById("scoreFinalModal").innerHTML = `✅ Acertos: ${acertosNaEtapa}/${filaSilabas.length}   |   Pontos: ${pontuacaoTotal}`;
        document.getElementById("tempoEtapa").innerHTML = `⏱️ Tempo desta etapa: ${formatarTempo(tempoEtapa)}`;
        
        if (faseAtual === 3) {
            let msgTempos = `⏱️ Etapa 1: ${formatarTempo(temposEtapas[0])} | Etapa 2: ${formatarTempo(temposEtapas[1])} | Etapa 3: ${formatarTempo(temposEtapas[2])}`;
            document.getElementById("tempoEtapa").innerHTML = msgTempos;
        }
        
        document.getElementById("vitoria-msg-sub").innerHTML = faseAtual < 3 ? "🐠 Próxima etapa..." : "🎉 PARABÉNS! Todas as famílias! 🎉";
        modalVitoria.style.display = "flex";
        
        let msg = faseAtual < 3 ? "Parabéns! Vamos para a próxima etapa!" : "Você é campeão! Aprendeu todas as famílias!";
        falarMensagem(msg, () => {
            setTimeout(() => {
                modalVitoria.style.display = "none";
                if (faseAtual < 3) { 
                    faseAtual++; 
                    iniciarEtapa();
                }
                else { 
                    finalizarJogoCompleto(); 
                }
            }, 1800);
        });
    }
    
    function finalizarJogoCompleto() {
        jogoAtivo = false;
        aquario.innerHTML = "";
        criarEfeitoBolhas(50);
        document.getElementById("vitoria-msg-topo").innerHTML = "🏅 MESTRE DAS SÍLABAS 🏅";
        document.getElementById("vitoria-msg-sub").innerHTML = "Ordem alfabética: B, C, Ç, D... Z!";
        document.getElementById("scoreFinalModal").innerHTML = `🌟 Pontuação final: ${pontuacaoTotal} 🌟`;
        
        let tempoTotal = temposEtapas[0] + temposEtapas[1] + temposEtapas[2];
        document.getElementById("tempoEtapa").innerHTML = `⏱️ Tempo total: ${formatarTempo(tempoTotal)}`;
        
        modalVitoria.style.display = "flex";
        falarMensagem("Parabéns! Você completou o alfabeto silábico!");
        setTimeout(() => modalVitoria.style.display = "none", 5000);
    }
    
    function voltarParaAlfabeto() {
        if (aguardandoProxima) return;
        modalNavegacao.style.display = "flex";
        falarMensagem("Voltar para o jogo do alfabeto?");
    }
    
    function fecharModalVolta() {
        modalNavegacao.style.display = "none";
    }
    
    function confirmarVolta() {
        modalNavegacao.style.display = "none";
        criarEfeitoBolhas(30);
        falarMensagem("Voltando ao alfabeto!");
        setTimeout(() => { window.location.href = "pesca_de_letrinhas.html"; }, 500);
    }
    
    // ========== CORREÇÃO: EVENTOS DE CLIQUE (IGUAL AO JOGO DE LETRAS) ==========
    document.getElementById("btnRepetirSilaba").addEventListener("click", (e) => {
        if (e.target.id !== "silabaAlvo") repetirSilabaAlvo();
    });

    document.getElementById("silabaAlvo").addEventListener("click", (e) => {
        e.stopPropagation();
        repetirSilabaAlvo();
    });
    
    document.getElementById("silabaAlvo").addEventListener("touchstart", (e) => {
        e.stopPropagation();
        repetirSilabaAlvo();
    }, { passive: true });
    
    document.getElementById("btnVoltarAlfabeto").addEventListener("click", voltarParaAlfabeto);
    document.getElementById("btnCancelarVolta").addEventListener("click", fecharModalVolta);
    document.getElementById("btnConfirmarVolta").addEventListener("click", confirmarVolta);
    
    // Desbloqueio de voz para mobile
    let vozDesbloqueada = false;
    const desbloquearVoz = () => {
        if (!vozDesbloqueada && window.speechSynthesis) {
            const u = new SpeechSynthesisUtterance("");
            u.volume = 0;
            window.speechSynthesis.speak(u);
            vozDesbloqueada = true;
            document.removeEventListener('touchstart', desbloquearVoz);
            document.removeEventListener('click', desbloquearVoz);
        }
    };
    document.addEventListener('touchstart', desbloquearVoz, { once: true });
    document.addEventListener('click', desbloquearVoz, { once: true });
    
    // Cursor personalizado (desktop)
    if (window.matchMedia('(hover: hover) and (pointer: fine)').matches) {
        const cursor = document.createElement('div');
        cursor.className = 'custom-cursor';
        document.body.appendChild(cursor);
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        document.addEventListener('mouseleave', () => { cursor.style.display = 'none'; });
        document.addEventListener('mouseenter', () => { cursor.style.display = 'block'; });
    }
    
    window.addEventListener('resize', () => {
        if (window.innerWidth < 768) peixesNaTela = 3;
        else if (window.innerWidth < 1024) peixesNaTela = 4;
        else peixesNaTela = 5;
    });
    
    setInterval(() => {
        if (jogoAtivo && !aguardandoProxima && Math.random() > 0.8) {
            const bolha = document.createElement("div");
            bolha.className = "bolha";
            const tam = Math.random() * (window.innerWidth < 768 ? 25 : 35) + 8 + "px";
            bolha.style.width = tam; bolha.style.height = tam;
            bolha.style.left = Math.random() * 100 + "vw";
            bolha.style.animationDuration = Math.random() * 3 + 2 + "s";
            document.body.appendChild(bolha);
            setTimeout(() => bolha.remove(), 5000);
        }
    }, 1200);
    
    window.onload = () => {
        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
        }
        iniciarEtapa();
    };
</script>
</body>
</html>
