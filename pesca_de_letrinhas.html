<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pesca de Letrinhas - EdHumanas</title>
    
    <style>
        :root {
            --primary: #ab47bc; 
            --secondary: #ffca28; 
            --text-light: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #000; color: var(--text-light);
            width: 100vw; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        #bg-video {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: 0;
            opacity: 0.7;
        }

        #game-wrapper {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 10;
            display: flex; flex-direction: column;
        }

        .top-bar {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            display: flex; gap: 15px;
        }
        
        .icon-btn {
            background: rgba(0, 0, 0, 0.6); border: 2px solid var(--secondary); color: white;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
            font-size: 24px; display: flex; justify-content: center; align-items: center;
        }

        .game-info-container {
            width: 100%; padding-top: 20px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 20; pointer-events: none;
        }

        .game-info {
            display: flex; gap: 30px; background: rgba(0, 0, 0, 0.7);
            padding: 10px 30px; border-radius: 50px; border: 2px solid var(--primary);
            font-weight: bold; font-size: 22px;
        }

        .instrucao { 
            font-size: 32px; font-weight: 900; margin-top: 15px; 
            background: rgba(0,0,0,0.6); padding: 5px 20px; border-radius: 15px;
        }
        #letraAlvo { color: var(--secondary); font-size: 45px; }

        .oceano {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 5;
            overflow: hidden; pointer-events: none;
        }

        .peixinho {
            position: absolute; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; width: 100px; height: 100px;
            pointer-events: auto;
        }
        
        .peixe-corpo { font-size: 75px; position: absolute; z-index: 1; }
        .letra-peixe {
            font-size: 35px; font-weight: 900; color: white; position: absolute; z-index: 2;
            text-shadow: 2px 2px 0 #000;
        }

        .pescado {
            animation: subir-vertical 0.7s ease-in forwards !important;
            pointer-events: none;
            z-index: 50;
        }

        @keyframes subir-vertical {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(0.6); opacity: 0; }
        }

        @keyframes nadar-direita { 0% { left: -120px; } 100% { left: 100%; } }
        @keyframes nadar-esquerda { 0% { left: 100%; } 100% { left: -120px; } }

        .bolha {
            position: absolute; bottom: -50px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
            animation: subir-bolha linear forwards;
        }
        @keyframes subir-bolha { to { transform: translateY(-120vh) translateX(50px); opacity: 0; } }

        #modal-vitoria {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .vitoria-texto { font-size: 5vh; color: var(--secondary); font-weight: bold; margin: 20px 0; }
        .icone-vitoria { font-size: 15vh; margin-bottom: 20px; }

        .erro-anim { animation: tremer 0.4s; filter: grayscale(100%); }
        @keyframes tremer { 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

<video autoplay loop muted playsinline id="bg-video">
    <source src="video_mar.mp4" type="video/mp4">
</video>

<audio id="bg-audio" src="som_fundo_do_mar.mp3" loop></audio>
<audio id="sfx-pescado" src="pescado.ogg"></audio>

<div id="game-wrapper">
    <div class="top-bar">
        <button class="icon-btn" onclick="window.location.href='index.html'">⬅️</button>
        <button id="btn-audio" class="icon-btn" onclick="toggleAudio()">🔇</button>
        <button class="icon-btn" onclick="toggleFullscreen()">⛶</button>
    </div>

    <div class="game-info-container">
        <div class="game-info">
            <div>Etapa: <span id="faseText">1</span>/2</div>
            <div>Letras: <span id="pontosText">0</span>/26</div>
        </div>
        <p class="instrucao">Pesque a letra: <span id="letraAlvo">?</span></p>
    </div>

    <div class="oceano" id="aquario"></div>
</div>

<div id="modal-vitoria">
    <div class="icone-vitoria" id="vitoria-icone">🏆</div>
    <div class="vitoria-texto" id="vitoria-msg-topo">Parabéns! Etapa Concluída!</div>
    <div class="vitoria-texto" id="vitoria-msg-sub" style="font-size: 3vh; color: #fff;">Preparando próxima fase...</div>
</div>

<script>
    let audioEnabled = false;
    const bgAudio = document.getElementById("bg-audio");
    const sfxPescado = document.getElementById("sfx-pescado");
    const btnAudio = document.getElementById("btn-audio");
    const aquario = document.getElementById("aquario");
    const modalVitoria = document.getElementById("modal-vitoria");

    const alfabetoCompleto = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").sort(() => Math.random() - 0.5);
    let indiceLetraAtual = 0;
    let faseAtual = 1;
    let peixesNaTela = 5;
    const emojisPeixe = ["🐟", "🐠", "🐡", "🦑"];

    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function toggleAudio() {
        audioEnabled = !audioEnabled;
        btnAudio.innerText = audioEnabled ? "🔊" : "🔇";
        audioEnabled ? bgAudio.play() : bgAudio.pause();
    }

    // Ajuste fonético pedagógico para as vogais
    function ajustarPronuncia(texto) {
        let t = texto.toUpperCase();
        if (t === "E") return "Ê";
        if (t === "O") return "Ô";
        return texto
            .replace(/\bletra E\b/gi, "letra Ê")
            .replace(/\bletra O\b/gi, "letra Ô");
    }

    function falar(texto, callback) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        
        const textoAjustado = ajustarPronuncia(texto);
        let u = new SpeechSynthesisUtterance(textoAjustado);
        u.lang = 'pt-BR';
        u.rate = 0.85; 

        if(callback) {
            u.onend = () => {
                setTimeout(callback, 200);
            };
        }
        window.speechSynthesis.speak(u);
    }

    function criarEfeitoBolhas() {
        for(let i=0; i<40; i++) {
            setTimeout(() => {
                const bolha = document.createElement("div");
                bolha.className = "bolha";
                const tam = Math.random() * 40 + 10 + "px";
                bolha.style.width = tam; bolha.style.height = tam;
                bolha.style.left = Math.random() * 100 + "vw";
                bolha.style.animationDuration = Math.random() * 2 + 2 + "s";
                document.body.appendChild(bolha);
                setTimeout(() => bolha.remove(), 4000);
            }, i * 40);
        }
    }

    function iniciarRodada() {
        if (indiceLetraAtual >= alfabetoCompleto.length) {
            finalizarJogoGeral();
            return;
        }

        const letraCerta = alfabetoCompleto[indiceLetraAtual];
        document.getElementById("letraAlvo").innerText = letraCerta;
        document.getElementById("faseText").innerText = faseAtual;
        document.getElementById("pontosText").innerText = indiceLetraAtual;
        aquario.innerHTML = "";

        let letrasRodada = [letraCerta];
        while (letrasRodada.length < peixesNaTela) {
            let aleat = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random() * 26)];
            if (!letrasRodada.includes(aleat)) letrasRodada.push(aleat);
        }

        letrasRodada.sort(() => Math.random() - 0.5).forEach(letra => criarPeixe(letra, letraCerta));
        setTimeout(() => falar("Pesque a letra " + letraCerta), 600);
    }

    function criarPeixe(letra, letraCerta) {
        const peixe = document.createElement("div");
        peixe.className = "peixinho";
        peixe.style.top = Math.floor(Math.random() * 60) + 20 + "%";

        const dir = Math.random() > 0.5;
        const speed = (Math.random() * 5) + 8;
        peixe.style.animation = dir ? `nadar-direita ${speed}s linear infinite` : `nadar-esquerda ${speed}s linear infinite`;

        const emoji = emojisPeixe[Math.floor(Math.random() * emojisPeixe.length)];
        const flip = dir ? 'transform: scaleX(-1);' : '';

        peixe.innerHTML = `<span class="peixe-corpo" style="${flip}">${emoji}</span><span class="letra-peixe">${letra}</span>`;
        
        peixe.onclick = () => {
            if (letra === letraCerta) {
                validarAcerto(peixe);
            } else {
                errou(peixe, letra);
            }
        };
        aquario.appendChild(peixe);
    }

    function validarAcerto(peixeElemento) {
        if(audioEnabled) {
            sfxPescado.currentTime = 0;
            sfxPescado.play().catch(e => {});
        }

        const rect = peixeElemento.getBoundingClientRect();
        peixeElemento.style.animation = "none";
        peixeElemento.style.left = rect.left + "px";
        peixeElemento.style.top = rect.top + "px";

        setTimeout(() => peixeElemento.classList.add("pescado"), 10);
        indiceLetraAtual++;
        
        falar("Muito bem!", () => {
            if (indiceLetraAtual === 13 && faseAtual === 1) {
                concluirEtapa();
            } else if (indiceLetraAtual === 26) {
                finalizarJogoGeral();
            } else {
                iniciarRodada();
            }
        });
    }

    function concluirEtapa() {
        faseAtual = 2;
        criarEfeitoBolhas();
        document.getElementById("vitoria-msg-topo").innerText = "Etapa 1 Concluída!";
        modalVitoria.style.display = "flex";
        
        falar("Parabéns! Você venceu a primeira etapa! Vamos para a segunda.", () => {
            setTimeout(() => {
                modalVitoria.style.display = "none";
                iniciarRodada();
            }, 2000);
        });
    }

    function finalizarJogoGeral() {
        criarEfeitoBolhas();
        document.getElementById("vitoria-icone").innerText = "🌟";
        document.getElementById("vitoria-msg-topo").innerText = "Alfabeto Completo!";
        document.getElementById("vitoria-msg-sub").innerText = "Você é um mestre da pescaria!";
        modalVitoria.style.display = "flex";
        falar("Incrível! Você pescou todo o alfabeto! Parabéns!");
    }

    function errou(p, letraErrada) {
        falar(letraErrada); 
        p.classList.add("erro-anim");
        setTimeout(() => p.classList.remove("erro-anim"), 500);
    }

    window.onload = iniciarRodada;
</script>
</body>
</html>
