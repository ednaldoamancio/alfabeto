<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parque das Letras - Pesca de Letrinhas</title>
    
    <style>
        :root {
            --primary: #ab47bc; --secondary: #ffca28; --bg-soft: #f3e9d7; --text: #3e2723;
            --card-bg: #fffdf8; --line-color: #d6e2f5; --margin-line: rgba(255, 82, 82, 0.5);
            --water-top: #4fc3f7; --water-bottom: #0288d1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-soft); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            transition: background 0.3s ease, color 0.3s ease;
            overflow: hidden;
        }

        body.dark {
            --bg-soft: #101017; --text: #f5f5f5; --card-bg: #181824; 
            --line-color: #2a3142; --margin-line: rgba(255, 138, 101, 0.7);
            --water-top: #0277bd; --water-bottom: #01579b;
        }

        .app { width: 100%; max-width: 900px; padding: 10px; text-align: center; }

        /* Estilo Caderno Pautado */
        .card {
            position: relative; background-color: var(--card-bg); border-radius: 18px; 
            padding: 20px 10px 30px; text-align: center;
            box-shadow: 0 16px 40px rgba(0,0,0,0.16), 0 0 0 4px rgba(255,255,255,0.9);
            background-image: repeating-linear-gradient(to bottom, transparent 0px, transparent 28px, var(--line-color) 29px);
            background-size: 100% 29px;
        }
        body.dark .card { box-shadow: 0 16px 40px rgba(0,0,0,0.7), 0 0 0 2px rgba(255,255,255,0.06); }
        .card::before {
            content: ""; position: absolute; top: 0; bottom: 0; left: 45px; width: 2px;
            background: var(--margin-line);
        }

        /* Top Bar */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 10px 10px; position: relative; z-index: 2;}
        .title { font-size: clamp(22px, 5vw, 30px); color: var(--primary); font-weight: 900; }
        
        .theme-toggle, .btn-back {
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.9); cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        body.dark .theme-toggle, body.dark .btn-back { background: rgba(30,30,45,0.9); border-color: rgba(255,255,255,0.15); }

        /* Painel de Jogo */
        .game-info {
            display: flex; justify-content: space-around; background: rgba(255,255,255,0.8);
            padding: 10px; border-radius: 12px; margin: 0 10px 15px; font-weight: 800; font-size: 18px;
            position: relative; z-index: 2; border: 2px dashed rgba(0,0,0,0.1);
        }
        body.dark .game-info { background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.1); }

        .instrucao { font-size: 24px; font-weight: 900; margin-bottom: 15px; position: relative; z-index: 2;}
        #letraAlvo { color: var(--primary); font-size: 36px; text-shadow: 1px 1px 0px rgba(0,0,0,0.1); }

        /* Oceano / Aquário */
        .oceano {
            width: 95%; max-width: 800px; height: 350px; margin: 0 auto; 
            background: linear-gradient(to bottom, var(--water-top), var(--water-bottom));
            border-radius: 30px; position: relative; overflow: hidden;
            border: 8px solid rgba(255,255,255,0.5); box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
            z-index: 2;
        }

        /* Peixinhos */
        .peixinho {
            position: absolute; cursor: pointer; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; width: 80px; height: 80px;
            transition: transform 0.2s; -webkit-tap-highlight-color: transparent;
        }
        
        .peixinho:active { transform: scale(0.9) !important; }

        .peixe-corpo { font-size: 55px; filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.3)); position: absolute;}
        
        .letra-peixe {
            font-size: 28px; font-weight: 900; color: white; position: relative; z-index: 5;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
        }

        /* Animações dos peixes */
        @keyframes nadar-direita {
            0% { left: -100px; transform: scaleX(-1); }
            100% { left: 100%; transform: scaleX(-1); }
        }
        @keyframes nadar-esquerda {
            0% { left: 100%; transform: scaleX(1); }
            100% { left: -100px; transform: scaleX(1); }
        }

        /* Efeito de Erro e Acerto */
        .erro-anim { animation: tremer 0.4s; filter: grayscale(100%); }
        @keyframes tremer { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* Modal de Acerto */
        #modal-acerto {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
            animation: fadeIn 0.3s;
        }
        .letra-gigante { font-size: 140px; font-weight: 900; color: var(--secondary); margin-bottom: 20px; text-shadow: 0 10px 20px rgba(0,0,0,0.5); animation: pular 1s infinite alternate; }
        .btn-proximo { padding: 15px 30px; font-size: 24px; font-weight: 900; background: var(--primary); color: white; border: none; border-radius: 20px; cursor: pointer; box-shadow: 0 6px 0px #7b1fa2;}
        .btn-proximo:active { transform: translateY(6px); box-shadow: 0 0px 0px #7b1fa2; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pular { from { transform: translateY(0); } to { transform: translateY(-30px); } }
    </style>
</head>
<body>

<div class="app">
    <div class="card">
        <div class="header">
            <button class="btn-back" onclick="window.location.href='index.html'" aria-label="Voltar">⬅️</button>
            <h1 class="title">🎣 Pesca de Letrinhas</h1>
            <button class="theme-toggle" id="themeToggle" aria-label="Alternar modo noturno">🌞</button>
        </div>

        <div class="game-info">
            <div>Fase: <span id="faseText">1</span></div>
            <div>Pontos: <span id="pontosText" style="color:var(--primary);">0</span></div>
        </div>

        <p class="instrucao">Pesque a letra: <span id="letraAlvo">?</span></p>

        <div class="oceano" id="aquario">
            <!-- Peixes gerados via JS -->
        </div>
    </div>
</div>

<!-- Tela de Vitória da Rodada -->
<div id="modal-acerto">
    <div class="letra-gigante" id="letraVitoria">A</div>
    <button class="btn-proximo" onclick="proximaRodada()">Continuar Pescando! 🎣</button>
</div>

<script>
    // ---------- MODO NOTURNO ----------
    const themeToggleBtn = document.getElementById("themeToggle");
    function setTheme(theme) {
        if (theme === "dark") {
            document.body.classList.add("dark"); themeToggleBtn.textContent = "🌙";
        } else {
            document.body.classList.remove("dark"); themeToggleBtn.textContent = "🌞";
        }
        localStorage.setItem("alfacel-theme", theme);
    }
    themeToggleBtn.addEventListener("click", () => {
        setTheme(document.body.classList.contains("dark") ? "light" : "dark");
    });
    window.addEventListener("load", () => {
        setTheme(localStorage.getItem("alfacel-theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));
    });

    // ---------- SÍNTESE DE VOZ (Speech API) ----------
    function falar(texto, pitch = 1.2) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(texto);
        u.lang = 'pt-BR'; u.rate = 0.85; u.pitch = pitch;
        window.speechSynthesis.speak(u);
    }

    // ---------- LÓGICA DO JOGO ----------
    const alfabeto = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    const emojisPeixe = ["🐟", "🐠", "🐡", "🦑"];
    
    let faseAtual = 1;
    let pontos = 0;
    let letraCerta = "";
    let peixesNaTela = 3; // Começa com 3 peixes (1 certo, 2 errados)

    const aquario = document.getElementById("aquario");
    const letraAlvoEl = document.getElementById("letraAlvo");
    const modalAcerto = document.getElementById("modal-acerto");

    function iniciarFase() {
        // Sorteia a letra que a criança deve pescar
        letraCerta = alfabeto[Math.floor(Math.random() * alfabeto.length)];
        letraAlvoEl.innerText = letraCerta;
        
        document.getElementById("faseText").innerText = faseAtual;
        document.getElementById("pontosText").innerText = pontos;

        // Limpa o aquário
        aquario.innerHTML = "";

        // Lista de letras que vão aparecer (1 certa, o resto aleatório)
        let letrasRodada = [letraCerta];
        while (letrasRodada.length < peixesNaTela) {
            let aleatoria = alfabeto[Math.floor(Math.random() * alfabeto.length)];
            if (!letrasRodada.includes(aleatoria)) letrasRodada.push(aleatoria);
        }

        // Embaralha as letras
        letrasRodada.sort(() => Math.random() - 0.5);

        // Cria os peixes no HTML
        letrasRodada.forEach(letra => criarPeixe(letra));

        // Fala a instrução
        setTimeout(() => falar("Pesque a letra " + letraCerta), 500);
    }

    function criarPeixe(letra) {
        const peixe = document.createElement("div");
        peixe.className = "peixinho";
        
        // Posição Y aleatória (evitando bordas)
        peixe.style.top = Math.floor(Math.random() * 70) + 10 + "%";

        // Define a direção do nado e tempo (dificuldade)
        const vaiParaDireita = Math.random() > 0.5;
        const tempoNado = (Math.random() * 5) + (8 - (faseAtual * 0.3)); // Fica mais rápido nas fases altas
        
        peixe.style.animation = vaiParaDireita 
            ? `nadar-direita ${tempoNado}s linear infinite` 
            : `nadar-esquerda ${tempoNado}s linear infinite`;

        const emoji = emojisPeixe[Math.floor(Math.random() * emojisPeixe.length)];
        
        peixe.innerHTML = `
            <span class="peixe-corpo">${emoji}</span>
            <span class="letra-peixe">${letra}</span>
        `;

        // Evento de clique / toque
        peixe.addEventListener("click", function() {
            if (letra === letraCerta) {
                acertou();
            } else {
                errou(peixe);
            }
        });

        aquario.appendChild(peixe);
    }

    function acertou() {
        falar("Muito bem! Letra " + letraCerta, 1.5);
        pontos += 10;
        
        // A cada 3 acertos, sobe de fase e aumenta a quantidade de peixes (até limite de 8)
        if (pontos % 30 === 0 && peixesNaTela < 8) {
            faseAtual++;
            peixesNaTela++;
        }

        document.getElementById("letraVitoria").innerText = letraCerta;
        modalAcerto.style.display = "flex";
    }

    function errou(peixeObj) {
        falar("Ops! Essa não.", 0.8);
        peixeObj.classList.add("erro-anim");
        // Remove a animação de erro para poder errar de novo o mesmo peixe se quiser
        setTimeout(() => peixeObj.classList.remove("erro-anim"), 500);
    }

    function proximaRodada() {
        modalAcerto.style.display = "none";
        iniciarFase();
    }

    // Inicia o jogo ao carregar
    window.addEventListener("load", iniciarFase);
</script>

</body>
</html>
