<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pesca de Letrinhas - EdHumanas</title>
    
    <style>
        :root {
            --primary: #ab47bc; 
            --secondary: #ffca28; 
            --text-light: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', Tahoma, sans-serif;
            background: #000;
            color: var(--text-light);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.75;
        }

        #game-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 15px;
        }
        
        .icon-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--secondary);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            transition: transform 0.2s;
        }
        
        .icon-btn:hover { transform: scale(1.05); }

        .game-info-container {
            width: 100%;
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
            pointer-events: none;
        }

        .game-info {
            display: flex;
            gap: 30px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 30px;
            border-radius: 50px;
            border: 2px solid var(--primary);
            font-weight: bold;
            font-size: 22px;
            backdrop-filter: blur(4px);
            flex-wrap: wrap;
            justify-content: center;
        }

        .instrucao { 
            font-size: 28px;
            font-weight: 900;
            margin-top: 15px;
            background: rgba(0,0,0,0.6);
            padding: 8px 24px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        
        #letraAlvo {
            color: var(--secondary);
            font-size: 52px;
            font-weight: bold;
            background: #000000aa;
            padding: 0 18px;
            border-radius: 50px;
            letter-spacing: 3px;
            text-shadow: 0 0 5px #ff9800;
        }

        .oceano {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            overflow: hidden;
            pointer-events: none;
        }

        .peixinho {
            position: absolute;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 110px;
            height: 110px;
            pointer-events: auto;
            transition: filter 0.1s;
        }
        
        .peixe-corpo {
            font-size: 85px;
            position: absolute;
            z-index: 1;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
        }
        
        .letra-peixe {
            font-size: 34px;
            font-weight: bold;
            color: #fff9c4;
            position: absolute;
            z-index: 2;
            text-shadow: 3px 3px 0 #0a2f5a;
            font-family: 'Courier New', monospace;
        }

        .pescado {
            animation: subir-vertical 0.7s ease-in forwards !important;
            pointer-events: none;
            z-index: 50;
        }

        @keyframes subir-vertical {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
        }

        @keyframes nadar-direita {
            0% { left: -150px; }
            100% { left: 100%; }
        }
        @keyframes nadar-esquerda {
            0% { left: 100%; }
            100% { left: -150px; }
        }

        .bolha {
            position: absolute;
            bottom: -50px;
            background: radial-gradient(circle, rgba(255,255,255,0.6), rgba(100,200,255,0.2));
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
            animation: subir-bolha linear forwards;
        }
        @keyframes subir-bolha {
            to { transform: translateY(-120vh) translateX(40px); opacity: 0; }
        }

        #modal-vitoria {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,20,45,0.96);
            backdrop-filter: blur(14px);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        
        .vitoria-texto {
            font-size: 5vh;
            color: var(--secondary);
            font-weight: bold;
            margin: 20px 0;
        }
        
        .icone-vitoria { font-size: 15vh; margin-bottom: 20px; animation: float 2s infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
        
        .score-panel { font-size: 28px; background: #1e2a3a; padding: 12px 28px; border-radius: 60px; margin-top: 20px; border: 1px solid var(--secondary); }

        .erro-anim {
            animation: tremer 0.4s ease;
            filter: grayscale(0.5) brightness(0.7);
        }
        @keyframes tremer {
            0% { transform: translateX(0px); }
            25% { transform: translateX(-12px) rotate(-3deg); }
            75% { transform: translateX(12px) rotate(3deg); }
            100% { transform: translateX(0px); }
        }
        
        .feedback-correto {
            position: fixed;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: #2e7d32dd;
            backdrop-filter: blur(8px);
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 32px;
            font-weight: bold;
            z-index: 200;
            animation: fadeUp 0.8s ease-out forwards;
            pointer-events: none;
            white-space: nowrap;
        }
        
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateX(-50%) translateY(30px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-50px); }
        }
        
        .star-point {
            position: absolute;
            font-size: 44px;
            pointer-events: none;
            z-index: 150;
            animation: estrelaPular 0.6s ease-out forwards;
        }
        
        @keyframes estrelaPular {
            0% { transform: scale(0.2) translateY(0); opacity: 1; }
            100% { transform: scale(1.2) translateY(-90px); opacity: 0; }
        }
        
        /* Botão flutuante para navegar para o jogo de sílabas */
        .btn-silabas {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #ff8c00, #ff5722);
            border: none;
            border-radius: 60px;
            padding: 14px 28px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            font-family: inherit;
            backdrop-filter: blur(4px);
            animation: pulse-glow 2s infinite;
        }
        
        .btn-silabas:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #ff9d2e, #ff6a3a);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(255, 140, 0, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(255, 140, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 140, 0, 0); }
        }
        
        .btn-silabas span {
            font-size: 28px;
        }
        
        /* Modal de confirmação para trocar de jogo */
        #modal-navegacao {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            z-index: 1100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        
        .nav-buttons {
            display: flex;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .nav-btn {
            background: linear-gradient(135deg, var(--primary), #7b1fa2);
            border: 2px solid var(--secondary);
            padding: 15px 35px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-family: inherit;
        }
        
        .nav-btn:hover { transform: scale(1.05); background: linear-gradient(135deg, #7b1fa2, #ab47bc); }
        
        .nav-btn.cancelar {
            background: linear-gradient(135deg, #555, #333);
            border-color: #888;
        }
        
        .nav-btn.confirmar {
            background: linear-gradient(135deg, #ff8c00, #ff5722);
        }
        
        .dica-som {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #aaa;
            pointer-events: none;
        }
    </style>
</head>
<body>

<video autoplay loop muted playsinline id="bg-video">
    <source src="video_mar.mp4" type="video/mp4">
</video>

<audio id="bg-audio" src="som_fundo_do_mar.mp3" loop></audio>
<audio id="sfx-pescado" src="pescado.ogg"></audio>
<audio id="sfx-erro" src="erro.mp3"></audio>

<div id="game-wrapper">
    <div class="top-bar">
        <button class="icon-btn" onclick="window.location.href='index.html'">⬅️</button>
        <button id="btn-audio" class="icon-btn" onclick="toggleAudio()">🔇</button>
        <button class="icon-btn" onclick="toggleFullscreen()">⛶</button>
    </div>

    <div class="game-info-container">
        <div class="game-info">
            <div>📚 Etapa: <span id="faseText">1</span>/2</div>
            <div>🏆 Letras: <span id="pontosText">0</span>/26</div>
        </div>
        <p class="instrucao">🐠 Pesque a letra: <span id="letraAlvo">?</span></p>
    </div>

    <div class="oceano" id="aquario"></div>
    
    <!-- Botão para acessar o jogo das sílabas -->
    <button class="btn-silabas" id="btnMudarSilabas">
        <span>🐟📖</span> Aprender Sílabas
    </button>
    
    <div class="dica-som">💡 Clique na letra para ouvir novamente</div>
</div>

<div id="modal-vitoria">
    <div class="icone-vitoria" id="vitoria-icone">🏆</div>
    <div class="vitoria-texto" id="vitoria-msg-topo">Parabéns! Etapa Concluída!</div>
    <div class="score-panel" id="scoreFinalModal">Pontuação: 0</div>
    <div class="vitoria-texto" id="vitoria-msg-sub" style="font-size: 3vh; color: #fff;">Preparando próxima fase...</div>
</div>

<!-- Modal de confirmação para navegação -->
<div id="modal-navegacao">
    <div class="icone-vitoria" style="font-size: 12vh;">🎣➡️📚</div>
    <div class="vitoria-texto" style="font-size: 4vh;">Vamos aprender as famílias silábicas?</div>
    <div class="vitoria-texto" style="font-size: 2.5vh; color: #ccc;">Você vai pescar sílabas como BA, BE, BI, BO, BU e muitas outras!</div>
    <div class="nav-buttons">
        <button class="nav-btn cancelar" id="btnCancelarNavegacao">❌ Continuar aqui</button>
        <button class="nav-btn confirmar" id="btnConfirmarNavegacao">🐟 Vamos pescar sílabas!</button>
    </div>
</div>

<script>
    let audioEnabled = false;
    const bgAudio = document.getElementById("bg-audio");
    const sfxPescado = document.getElementById("sfx-pescado");
    const sfxErro = document.getElementById("sfx-erro");
    const btnAudio = document.getElementById("btn-audio");
    const aquario = document.getElementById("aquario");
    const modalVitoria = document.getElementById("modal-vitoria");
    const modalNavegacao = document.getElementById("modal-navegacao");

    const alfabetoCompleto = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").sort(() => Math.random() - 0.5);
    let indiceLetraAtual = 0;
    let faseAtual = 1;
    let pontuacaoTotal = 0;
    let peixesNaTela = 5;
    let jogoAtivo = true;
    let aguardandoProxima = false;
    let speechPending = false;
    
    const emojisPeixe = ["🐟", "🐠", "🐡", "🐋", "🦈", "🐙", "🐬", "🐳"];

    // ========== SISTEMA DE PRONÚNCIA ==========
    function obterPronunciaLetra(letra) {
        const upper = letra.toUpperCase();
        const pronunciaMap = {
            "A": "á", "B": "bê", "C": "cê", "D": "dê", "E": "ê", "F": "fê",
            "G": "gê", "H": "agá", "I": "i", "J": "jóta", "K": "cá", "L": "éle",
            "M": "ême", "N": "êne", "O": "ô", "P": "pê", "Q": "quê", "R": "érre",
            "S": "ésse", "T": "tê", "U": "u", "V": "vê", "W": "dáblio", 
            "X": "xis", "Y": "ípsilon", "Z": "zê"
        };
        return pronunciaMap[upper] || letra.toLowerCase();
    }

    function falarLetra(letra, callback) {
        if (!window.speechSynthesis) {
            if (callback) callback();
            return;
        }
        
        window.speechSynthesis.cancel();
        
        const pronuncia = obterPronunciaLetra(letra);
        
        const utterance = new SpeechSynthesisUtterance(pronuncia);
        utterance.lang = 'pt-BR';
        utterance.rate = 0.85;
        utterance.pitch = 1.0;
        
        const voices = window.speechSynthesis.getVoices();
        const ptBrVoice = voices.find(v => v.lang === 'pt-BR' && 
            (v.name.includes('Google') || v.name.includes('Microsoft') || 
             v.name.includes('Maria') || v.name.includes('Natural')));
        if (ptBrVoice) utterance.voice = ptBrVoice;
        
        if (callback) {
            utterance.onend = () => setTimeout(callback, 150);
        }
        
        window.speechSynthesis.speak(utterance);
    }
    
    function falarMensagem(msg, callback) {
        if (!window.speechSynthesis) {
            if (callback) callback();
            return;
        }
        
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(msg);
        utterance.lang = 'pt-BR';
        utterance.rate = 0.85;
        utterance.pitch = 1.0;
        
        const voices = window.speechSynthesis.getVoices();
        const ptBrVoice = voices.find(v => v.lang === 'pt-BR' && 
            (v.name.includes('Google') || v.name.includes('Microsoft') || 
             v.name.includes('Maria') || v.name.includes('Natural')));
        if (ptBrVoice) utterance.voice = ptBrVoice;
        
        if (callback) {
            utterance.onend = () => setTimeout(callback, 150);
        }
        
        window.speechSynthesis.speak(utterance);
    }
    
    function falarParabensELetra(letra, callback) {
        if (!window.speechSynthesis) {
            if (callback) callback();
            return;
        }
        
        window.speechSynthesis.cancel();
        
        const pronuncia = obterPronunciaLetra(letra);
        const textoCompleto = `Muito bem! ${pronuncia}`;
        
        const utterance = new SpeechSynthesisUtterance(textoCompleto);
        utterance.lang = 'pt-BR';
        utterance.rate = 0.85;
        utterance.pitch = 1.0;
        
        const voices = window.speechSynthesis.getVoices();
        const ptBrVoice = voices.find(v => v.lang === 'pt-BR' && 
            (v.name.includes('Google') || v.name.includes('Microsoft') || 
             v.name.includes('Maria') || v.name.includes('Natural')));
        if (ptBrVoice) utterance.voice = ptBrVoice;
        
        if (callback) {
            utterance.onend = () => setTimeout(callback, 150);
        }
        
        window.speechSynthesis.speak(utterance);
    }

    function repetirLetraAlvo() {
        const letraAtual = document.getElementById("letraAlvo").innerText;
        if (letraAtual && letraAtual !== "?" && jogoAtivo && !aguardandoProxima) {
            const elemento = document.getElementById("letraAlvo");
            elemento.style.transform = "scale(1.1)";
            setTimeout(() => {
                elemento.style.transform = "scale(1)";
            }, 200);
            falarLetra(letraAtual);
        }
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function toggleAudio() {
        audioEnabled = !audioEnabled;
        btnAudio.innerText = audioEnabled ? "🔊" : "🔇";
        if (audioEnabled) {
            bgAudio.play().catch(e => console.log("autoplay bloqueado"));
        } else {
            bgAudio.pause();
        }
    }

    function criarEfeitoBolhas(quantidade = 40) {
        for(let i = 0; i < quantidade; i++) {
            setTimeout(() => {
                const bolha = document.createElement("div");
                bolha.className = "bolha";
                const tam = Math.random() * 40 + 12 + "px";
                bolha.style.width = tam;
                bolha.style.height = tam;
                bolha.style.left = Math.random() * 100 + "vw";
                bolha.style.animationDuration = Math.random() * 2.5 + 2 + "s";
                bolha.style.opacity = Math.random() * 0.6 + 0.2;
                document.body.appendChild(bolha);
                setTimeout(() => bolha.remove(), 4500);
            }, i * 35);
        }
    }
    
    function mostrarEstrela(x, y) {
        const star = document.createElement("div");
        star.className = "star-point";
        star.innerText = "⭐";
        star.style.left = x + "px";
        star.style.top = y + "px";
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 700);
    }
    
    function mostrarFeedback(texto, isAcerto) {
        const div = document.createElement("div");
        div.className = "feedback-correto";
        div.style.background = isAcerto ? "#2e7d32dd" : "#c62828dd";
        div.innerText = texto;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 850);
    }

    function iniciarRodada() {
        if (indiceLetraAtual >= alfabetoCompleto.length) {
            finalizarJogoGeral();
            return;
        }

        const letraCerta = alfabetoCompleto[indiceLetraAtual];
        document.getElementById("letraAlvo").innerText = letraCerta;
        document.getElementById("faseText").innerHTML = faseAtual;
        document.getElementById("pontosText").innerHTML = indiceLetraAtual;
        aquario.innerHTML = "";

        let letrasRodada = [letraCerta];
        while (letrasRodada.length < peixesNaTela) {
            let aleat = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random() * 26)];
            if (!letrasRodada.includes(aleat)) letrasRodada.push(aleat);
        }

        letrasRodada.sort(() => Math.random() - 0.5).forEach(letra => criarPeixe(letra, letraCerta));
        setTimeout(() => falarMensagem("Pesque a letra " + letraCerta), 400);
    }

    function criarPeixe(letra, letraCerta) {
        const peixe = document.createElement("div");
        peixe.className = "peixinho";
        peixe.style.top = Math.floor(Math.random() * 65 + 15) + "%";

        const dir = Math.random() > 0.5;
        const duracao = (Math.random() * 6) + 7;
        peixe.style.animation = dir ? `nadar-direita ${duracao}s linear infinite` : `nadar-esquerda ${duracao}s linear infinite`;

        const emoji = emojisPeixe[Math.floor(Math.random() * emojisPeixe.length)];
        const flip = dir ? 'transform: scaleX(-1);' : '';

        peixe.innerHTML = `<span class="peixe-corpo" style="${flip}">${emoji}</span><span class="letra-peixe">${letra}</span>`;
        
        peixe.onclick = () => {
            if (!jogoAtivo || aguardandoProxima) return;
            if (letra === letraCerta) {
                validarAcerto(peixe, letra);
            } else {
                errou(peixe, letra);
            }
        };
        aquario.appendChild(peixe);
    }

    function validarAcerto(peixeElemento, letraClicada) {
        if (!jogoAtivo) return;
        jogoAtivo = false;
        
        if (audioEnabled) {
            sfxPescado.currentTime = 0;
            sfxPescado.play().catch(e => {});
        }

        const rect = peixeElemento.getBoundingClientRect();
        peixeElemento.style.animation = "none";
        peixeElemento.style.left = rect.left + "px";
        peixeElemento.style.top = rect.top + "px";

        setTimeout(() => peixeElemento.classList.add("pescado"), 10);
        
        pontuacaoTotal += 10;
        indiceLetraAtual++;
        
        mostrarEstrela(rect.left + 45, rect.top + 40);
        mostrarFeedback(`✅ +10  ${letraClicada}`, true);
        
        speechPending = true;
        falarParabensELetra(letraClicada, () => {
            speechPending = false;
            if (indiceLetraAtual === 13 && faseAtual === 1) {
                concluirEtapa();
            } else if (indiceLetraAtual >= alfabetoCompleto.length) {
                finalizarJogoGeral();
            } else {
                jogoAtivo = true;
                iniciarRodada();
            }
        });
    }

    function concluirEtapa() {
        faseAtual = 2;
        criarEfeitoBolhas(50);
        document.getElementById("vitoria-icone").innerHTML = "🏆✨";
        document.getElementById("vitoria-msg-topo").innerText = "Etapa 1 Concluída!";
        document.getElementById("scoreFinalModal").innerHTML = `✅ Letras pescadas: ${indiceLetraAtual}   |   Pontos: ${pontuacaoTotal}`;
        document.getElementById("vitoria-msg-sub").innerHTML = "Preparando segunda etapa...";
        modalVitoria.style.display = "flex";
        
        falarMensagem("Parabéns! Você venceu a primeira etapa! Vamos para a segunda.", () => {
            setTimeout(() => {
                modalVitoria.style.display = "none";
                jogoAtivo = true;
                iniciarRodada();
            }, 2000);
        });
    }

    function finalizarJogoGeral() {
        criarEfeitoBolhas(70);
        document.getElementById("vitoria-icone").innerHTML = "🌟🏆🐟";
        document.getElementById("vitoria-msg-topo").innerText = "Alfabeto Completo!";
        document.getElementById("vitoria-msg-sub").innerText = "Você é um mestre da pescaria!";
        document.getElementById("scoreFinalModal").innerHTML = `🌟 Pontuação final: ${pontuacaoTotal} 🌟`;
        modalVitoria.style.display = "flex";
        falarMensagem("Incrível! Você pescou todo o alfabeto! Parabéns!");
    }

    function errou(peixeElem, letraErrada) {
        if (audioEnabled && sfxErro) {
            sfxErro.currentTime = 0;
            sfxErro.play().catch(e=>{});
        }
        mostrarFeedback(`❌ ${letraErrada}`, false);
        falarLetra(letraErrada);
        peixeElem.classList.add("erro-anim");
        setTimeout(() => peixeElem.classList.remove("erro-anim"), 500);
    }

    // ========== FUNÇÕES DE NAVEGAÇÃO PARA O JOGO DAS SÍLABAS ==========
    function convidarParaSilabas() {
        if (aguardandoProxima) return;
        modalNavegacao.style.display = "flex";
        falarMensagem("Vamos pescar mais?");
    }
    
    function fecharModalNavegacao() {
        modalNavegacao.style.display = "none";
        falarMensagem("Continue pescando letras!");
    }
    
    function irParaSilabas() {
        modalNavegacao.style.display = "none";
        criarEfeitoBolhas(40);
        falarMensagem("Vamos pescar sílabas!", () => {
            window.location.href = "pesca_silabica.html";
        });
    }
    
    // Configurar eventos
    document.getElementById("btnMudarSilabas").addEventListener("click", convidarParaSilabas);
    document.getElementById("btnCancelarNavegacao").addEventListener("click", fecharModalNavegacao);
    document.getElementById("btnConfirmarNavegacao").addEventListener("click", irParaSilabas);
    
    // Clique na letra alvo para repetir
    document.getElementById("letraAlvo").addEventListener("click", function(e) {
        e.stopPropagation();
        repetirLetraAlvo();
    });
    
    document.querySelector(".instrucao").addEventListener("click", function(e) {
        if (e.target !== document.getElementById("letraAlvo")) {
            repetirLetraAlvo();
        }
    });
    
    // Bolhas contínuas
    setInterval(() => {
        if (jogoAtivo && !aguardandoProxima && Math.random() > 0.75) {
            const bolha = document.createElement("div");
            bolha.className = "bolha";
            bolha.style.width = Math.random() * 35 + 8 + "px";
            bolha.style.height = bolha.style.width;
            bolha.style.left = Math.random() * 100 + "vw";
            bolha.style.animationDuration = Math.random() * 3 + 2.5 + "s";
            document.body.appendChild(bolha);
            setTimeout(() => bolha.remove(), 5000);
        }
    }, 1100);
    
    // Inicialização
    window.onload = () => {
        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
        }
        iniciarRodada();
    };
</script>
</body>
</html>
