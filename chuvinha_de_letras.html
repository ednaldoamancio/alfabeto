<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chuva de Letras - Alfabeto Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        /* Variáveis de Tema (Noturno / Diurno Arcade) */
        :root {
            --bg-color: #0a0a2a; /* Azul muito escuro (Diurno) */
            --hud-bg: rgba(255, 255, 255, 0.1);
        }
        body.dark-mode {
            --bg-color: #000000; /* Preto absoluto (Noturno) */
            --hud-bg: rgba(0, 255, 255, 0.05);
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: #ffffff;
            font-family: 'Fredoka One', cursive; overflow: hidden;
            touch-action: none; transition: background-color 0.5s;
        }

        /* Botão Tema e Teclado Mobile */
        .controles-topo { position: absolute; top: 15px; right: 80px; z-index: 200; display: flex; gap: 15px; }
        .btn-acao {
            background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%;
            width: 50px; height: 50px; font-size: 24px; cursor: pointer; color: white;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }

        /* HUD - Informações na tela */
        .hud { position: absolute; top: 15px; left: 20px; z-index: 100; }
        .letra-alvo { font-size: clamp(20px, 4vw, 35px); color: #fff; text-shadow: 0 0 10px #fff; margin: 0; }
        .pontuacao { font-size: clamp(16px, 3vw, 24px); color: #00ff00; margin: 5px 0 0 0; }

        /* Barra de Ranking/Energia na lateral direita (Max 1000) */
        .ranking-container {
            position: absolute; right: 15px; top: 80px; bottom: 30px;
            width: clamp(20px, 4vw, 40px); background: var(--hud-bg);
            border: 3px solid #555; border-radius: 20px;
            display: flex; flex-direction: column; justify-content: flex-end;
            overflow: hidden; z-index: 100; box-shadow: 0 0 15px rgba(0,255,255,0.2);
        }
        .ranking-barra {
            width: 100%; height: 20%; background: linear-gradient(to top, #ff0000, #ffff00, #00ff00);
            transition: height 0.2s ease-out;
        }

        /* As Letras da Chuva */
        .letra-chuva {
            position: absolute; 
            width: 3.84vw; /* Exatamente 100% dividido por 26 letras */
            text-align: center;
            font-size: clamp(18px, 3.5vw, 50px); 
            font-weight: bold;
            text-shadow: 0 0 15px currentColor; /* Brilho neon */
            user-select: none;
        }

        /* Letra Congelada no ar */
        .congelada {
            animation: piscar 0.5s alternate infinite;
            filter: drop-shadow(0 0 25px currentColor);
            z-index: 50; border-bottom: 3px solid currentColor; /* Sublinhado para destacar */
        }
        @keyframes piscar { from { opacity: 0.7; transform: scale(1); } to { opacity: 1; transform: scale(1.3); } }

        #mobile-input { position: absolute; opacity: 0; top: -1000px; }

        /* Confetes e Vitória */
        .confete { position: absolute; width: 12px; height: 12px; z-index: 999; animation: cairConfete linear forwards; }
        @keyframes cairConfete { to { transform: translateY(110vh) rotate(1080deg); } }
        
        #tela-vitoria {
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.92);
            z-index: 2000; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        #tela-vitoria h1 { font-size: clamp(40px, 8vw, 80px); color: #00ff00; text-shadow: 0 0 30px #00ff00; margin: 0;}
        .btn-jogar {
            margin-top: 40px; padding: 20px 50px; font-family: 'Fredoka One'; font-size: 24px;
            background: #00ff00; color: #000; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 8px 0 #008800; transition: 0.2s;
        }
        .btn-jogar:active { transform: translateY(8px); box-shadow: none; }

    </style>
</head>
<body class="dark-mode"> <div class="controles-topo">
    <button class="btn-acao" onclick="abrirTeclado()" title="Abrir Teclado Mobile">⌨️</button>
    <button class="btn-acao" onclick="toggleTheme()" id="btnTheme" title="Alternar Fundo">☀️</button>
</div>

<div class="hud">
    <p class="letra-alvo">PRÓXIMA: <span id="alvo-atual" style="color: #ff00ff; font-size: clamp(40px, 6vw, 60px);">A</span></p>
    <p class="pontuacao">PONTOS: <span id="score-display">200</span> / 1000</p>
</div>

<div class="ranking-container">
    <div class="ranking-barra" id="barra-energia"></div>
</div>

<input type="text" id="mobile-input" autocomplete="off" autocorrect="off" autocapitalize="characters">

<div id="tela-vitoria">
    <h1>🏆 FANTÁSTICO! 🏆<br>1000 PONTOS!</h1>
    <p style="color: #fff; font-size: 24px;">O alfabeto está dominado!</p>
    <button class="btn-jogar" onclick="location.reload()">JOGAR DE NOVO</button>
</div>

<script>
    const alfabeto = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let indexAtual = 0;
    let score = 200; // Começa com 200
    const maxScore = 1000; // Nova pontuação máxima
    
    const velocidadeQuedaBase = 2.5; 
    let letrasEmJogo = [];
    let animationId;
    let jogoRodando = true;

    const musicaFundo = new Audio('musica_fundo.ogg');
    musicaFundo.loop = true; musicaFundo.volume = 0.4;

    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark-mode');
        document.getElementById('btnTheme').innerText = isDark ? '☀️' : '🌙';
    }

    function abrirTeclado() {
        document.getElementById('mobile-input').focus();
        if(musicaFundo.paused) musicaFundo.play().catch(()=>{});
    }

    function corAleatoria() {
        const cores = ['#ff00ff', '#00ffff', '#00ff00', '#ffff00', '#ff5500', '#ff0055', '#5500ff'];
        return cores[Math.floor(Math.random() * cores.length)];
    }

    function criarLetra(letra, index) {
        const el = document.createElement('div');
        el.className = 'letra-chuva';
        el.innerText = letra;
        el.style.color = corAleatoria();
        
        // Posicionamento horizontal exato (3.84vw por letra)
        el.style.left = (index * 3.84) + 'vw';
        el.style.top = '-100px'; 

        document.body.appendChild(el);

        return {
            elemento: el,
            letra: letra,
            // Atraso menor para que o jogador super rápido não fique esperando tanto
            y: -50 - (index * 120), 
            velocidade: velocidadeQuedaBase + (Math.random() * 1.2),
            congelada: false
        };
    }

    for(let i = 0; i < alfabeto.length; i++) {
        letrasEmJogo.push(criarLetra(alfabeto[i], i));
    }

    function atualizarEnergia(mudanca) {
        score += mudanca;
        if(score > maxScore) score = maxScore;
        if(score < 0) score = 0;
        
        document.getElementById('score-display').innerText = score;
        const porcentagem = (score / maxScore) * 100;
        document.getElementById('barra-energia').style.height = porcentagem + '%';
    }

    function loopJogo() {
        if(!jogoRodando) return;
        const alturaTela = window.innerHeight;

        letrasEmJogo.forEach(obj => {
            if(!obj.congelada) {
                obj.y += obj.velocidade;
                
                if(obj.y > alturaTela) {
                    obj.y = -50; 
                    tocarSom('trovao.ogg');
                    atualizarEnergia(-5); // Perde um pouco se bater no chão
                }
                obj.elemento.style.top = obj.y + 'px';
            }
        });
        animationId = requestAnimationFrame(loopJogo);
    }

    window.addEventListener('keydown', processarTecla);
    document.getElementById('mobile-input').addEventListener('input', (e) => {
        const val = e.target.value;
        if(val.length > 0) {
            processarTecla({ key: val.charAt(val.length-1) });
            e.target.value = ''; 
        }
    });

    function processarTecla(e) {
        if(!jogoRodando) return;
        const tecla = e.key.toUpperCase();
        if(!/^[A-Z]$/.test(tecla)) return; 
        if(musicaFundo.paused) musicaFundo.play().catch(()=>{});

        const letraEsperada = alfabeto[indexAtual];

        if(tecla === letraEsperada) {
            tocarSom('estampido.ogg');
            atualizarEnergia(35); // Ganha bem ao acertar
            
            const objLetra = letrasEmJogo[indexAtual];
            objLetra.congelada = true;
            
            // A MÁGICA DOS DIGITADORES VELOZES: Se a letra estiver fora da tela, ela aparece colada no teto!
            if (objLetra.y < 20) {
                objLetra.y = 80; // Força a exibição na parte de cima da tela
            }
            objLetra.elemento.style.top = objLetra.y + 'px';
            objLetra.elemento.classList.add('congelada');

            indexAtual++;
            
            if(indexAtual < alfabeto.length) {
                document.getElementById('alvo-atual').innerText = alfabeto[indexAtual];
                document.getElementById('alvo-atual').style.color = corAleatoria();
            } else {
                vencerJogo();
            }
        } else {
            tocarSom('erro.ogg');
            atualizarEnergia(-15); // Perde ponto ao errar digitação
            document.body.animate([
                { transform: 'translateX(-10px)' }, { transform: 'translateX(10px)' }, { transform: 'translateX(0)' }
            ], { duration: 150 });
        }
    }

    function vencerJogo() {
        jogoRodando = false;
        tocarSom('aplausos.ogg');
        atualizarEnergia(maxScore); // Enche a barra no final
        document.getElementById('tela-vitoria').style.display = 'flex';
        
        // A clássica chuva de confetes!
        for (let i = 0; i < 200; i++) {
            const c = document.createElement('div');
            c.className = 'confete';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.backgroundColor = corAleatoria();
            c.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(c);
        }
    }

    function tocarSom(arq) { new Audio(arq).play().catch(() => {}); }

    atualizarEnergia(0);
    loopJogo();
</script>
</body>
</html>
