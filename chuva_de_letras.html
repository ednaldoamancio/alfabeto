<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chuva de Letras - Alfabeto Ninja</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #000000; }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: #ffffff;
            font-family: 'Fredoka One', cursive; overflow: hidden;
            touch-action: none; transition: background-color 0.5s;
        }

        /* BARRA VERTICAL DE PONTUAÇÃO (DIREITA) */
        /* Z-INDEX 3000 garante que ela fique acima inclusive da tela de vitória */
        .ranking-lateral {
            position: absolute; right: 20px; top: 100px; bottom: 50px;
            width: 30px; background: #222; border-radius: 15px;
            border: 2px solid #444; overflow: hidden; z-index: 3000;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .ranking-preenchimento {
            position: absolute; bottom: 0; width: 100%; height: 0%;
            transition: height 0.3s ease-out, background 0.3s;
            box-shadow: 0 0 20px currentColor;
        }

        /* TELAS (START / VITÓRIA) */
        .overlay {
            position: absolute; inset: 0; z-index: 2000; 
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }
        
        #tela-inicio { background: rgba(0,0,0,0.95); }

        /* TELA DE VITÓRIA COM TRANSPARÊNCIA INTELIGENTE */
        #tela-vitoria { 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(4px);
        }

        h1 { font-size: clamp(30px, 6vw, 60px); color: #fff; margin-bottom: 20px; }
        
        .btn-jogar {
            padding: 20px 60px; font-family: 'Fredoka One'; font-size: 24px;
            background: #00ff00; color: #000; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 8px 0 #008800; transition: 0.2s;
        }
        .btn-jogar:active { transform: translateY(8px); box-shadow: none; }

        /* HUD */
        .hud { position: absolute; top: 20px; left: 20px; z-index: 100; }
        .letra-alvo { font-size: 24px; margin: 0; }
        #alvo-atual { font-size: 60px; display: block; }

        .letra-chuva {
            position: absolute; width: 3.8vw; text-align: center;
            font-size: clamp(25px, 4vw, 60px); font-weight: bold;
            text-shadow: 0 0 20px currentColor; opacity: 0;
            user-select: none;
        }
        .congelada { opacity: 1 !important; border-bottom: 4px solid currentColor; animation: piscar 0.5s alternate infinite; }
        .perdida { opacity: 0.2 !important; filter: grayscale(100%); }
        
        @keyframes piscar { from { transform: scale(1); } to { transform: scale(1.2); } }
        #mobile-input { position: absolute; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<input type="text" id="mobile-input" autocomplete="off" autocapitalize="characters">

<div id="tela-inicio" class="overlay">
    <h1>ALFABETO NINJA</h1>
    <p>Aprenda a sequência e a posição das letras!</p>
    <button class="btn-jogar" id="btn-start">INICIAR JOGO</button>
    <p style="margin-top: 20px; font-size: 14px; opacity: 0.7;">Pressione ENTER ou Toque para começar</p>
</div>

<div id="tela-vitoria" class="overlay" style="display: none;">
    <h1 id="titulo-vitoria">🏆 FANTÁSTICO! 🏆</h1>
    <div style="font-size: 40px; color: gold; text-shadow: 2px 2px 8px #000;" id="pontuacao-final">0 PONTOS</div>
    <button class="btn-jogar" onclick="location.reload()" style="margin-top: 30px;">JOGAR DE NOVO</button>
</div>

<div class="hud">
    <p class="letra-alvo">PRÓXIMA:<br><span id="alvo-atual">A</span></p>
    <p>PONTOS: <span id="score-text">0</span></p>
</div>

<div class="ranking-lateral">
    <div id="barra-energia" class="ranking-preenchimento"></div>
</div>

<script>
    const alfabeto = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let indexAtual = 0;
    let score = 0;
    const maxScore = 1000;
    const tempoQuedaSegundos = 2.0; 
    let letrasEmJogo = [];
    let jogoRodando = false;

    // Áudios
    const musicaFundo = new Audio('musica_fundo.ogg');
    musicaFundo.loop = true;
    musicaFundo.volume = 0.4;

    function tocarSom(arq) {
        const som = new Audio(arq);
        som.play().catch(() => {});
    }

    const inputMobile = document.getElementById('mobile-input');
    const btnStart = document.getElementById('btn-start');

    for(let i = 0; i < alfabeto.length; i++) {
        const el = document.createElement('div');
        el.className = 'letra-chuva';
        el.innerText = alfabeto[i];
        el.style.color = `hsl(${i * 13}, 100%, 60%)`;
        el.style.left = (i * 3.5 + 2) + 'vw';
        el.style.top = '-100px'; 
        document.body.appendChild(el);
        letrasEmJogo.push({ elemento: el, letra: alfabeto[i], y: -100, ativa: false, resolvida: false });
    }

    function iniciarJogo() {
        if(jogoRodando) return;
        document.getElementById('tela-inicio').style.display = 'none';
        musicaFundo.play().catch(() => {});
        inputMobile.focus(); 
        
        setTimeout(() => {
            jogoRodando = true;
            iniciarLetra(0);
            loopJogo();
        }, 1000);
    }

    function atualizarEnergia(mudanca) {
        score = Math.max(0, Math.min(maxScore, score + mudanca));
        document.getElementById('score-text').innerText = score;
        
        const barra = document.getElementById('barra-energia');
        const porc = (score / maxScore) * 100;
        barra.style.height = porc + '%';

        if (porc < 25) { barra.style.backgroundColor = '#ff0000'; barra.style.color = '#ff0000'; }
        else if (porc < 50) { barra.style.backgroundColor = '#ff8800'; barra.style.color = '#ff8800'; }
        else if (porc < 75) { barra.style.backgroundColor = '#ffff00'; barra.style.color = '#ffff00'; }
        else { barra.style.backgroundColor = '#00ff00'; barra.style.color = '#00ff00'; }
    }

    function iniciarLetra(index) {
        if(index >= alfabeto.length) { vencerJogo(); return; }
        const obj = letrasEmJogo[index];
        document.getElementById('alvo-atual').innerText = obj.letra;
        document.getElementById('alvo-atual').style.color = obj.elemento.style.color;
        obj.ativa = true;
        obj.startTime = Date.now();
        obj.elemento.style.opacity = '1';
    }

    function loopJogo() {
        if(!jogoRodando) return;
        const obj = letrasEmJogo[indexAtual];
        const alturaChao = window.innerHeight - 80;

        if (obj && obj.ativa && !obj.resolvida) {
            const decorrido = (Date.now() - obj.startTime) / 1000;
            const progresso = decorrido / tempoQuedaSegundos;
            obj.y = -100 + (progresso * (alturaChao + 100));

            if (progresso >= 1.0) {
                obj.y = alturaChao;
                obj.resolvida = true;
                obj.elemento.classList.add('perdida');
                tocarSom('trovao.ogg');
                atualizarEnergia(-30);
                indexAtual++;
                iniciarLetra(indexAtual);
            }
            obj.elemento.style.top = obj.y + 'px';
        }
        requestAnimationFrame(loopJogo);
    }

    function processarTecla(tecla) {
        if(!jogoRodando || indexAtual >= alfabeto.length) return;
        const letraDigitada = tecla.toUpperCase();
        const objAtual = letrasEmJogo[indexAtual];

        if(letraDigitada === objAtual.letra) {
            tocarSom('estampido.ogg');
            const progresso = (Date.now() - objAtual.startTime) / (tempoQuedaSegundos * 1000);
            const pontosGanhos = Math.max(15, Math.floor(40 * (1 - progresso)));
            atualizarEnergia(pontosGanhos);
            objAtual.resolvida = true;
            objAtual.elemento.classList.add('congelada');
            indexAtual++;
            iniciarLetra(indexAtual);
        } else {
            tocarSom('erro.ogg');
            atualizarEnergia(-15);
            document.body.animate([{opacity: 0.5}, {opacity: 1}], 100);
        }
    }

    btnStart.addEventListener('click', iniciarJogo);
    window.addEventListener('keydown', (e) => {
        if(e.key === "Enter" && !jogoRodando) iniciarJogo();
        if(jogoRodando && /^[a-zA-Z]$/.test(e.key)) processarTecla(e.key);
    });
    inputMobile.addEventListener('input', (e) => {
        const val = e.target.value;
        if(val.length > 0) { 
            processarTecla(val.charAt(val.length-1)); 
            e.target.value = ''; 
        }
    });

    function vencerJogo() {
        jogoRodando = false;
        musicaFundo.pause();
        tocarSom('aplausos.ogg');
        document.getElementById('tela-vitoria').style.display = 'flex';
        document.getElementById('pontuacao-final').innerText = score + " PONTOS";
    }

    atualizarEnergia(0);
</script>
</body>
</html>
